<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Evaluation</title>
  <meta name="api-base-url" content="https://go-kerala-backend.onrender.com">
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260413-1">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-blank-main owner-evaluation-main">
    <section class="owner-evaluation-card" aria-label="Document evaluation in progress">
      <div class="owner-evaluation-icon-wrap" aria-hidden="true">
        <span class="owner-evaluation-icon">
          <svg viewBox="0 0 24 24" fill="none" role="img" aria-label="Clock icon">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"></circle>
            <path d="M12 7.7v4.7l3.2 1.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
      </div>

      <p class="owner-evaluation-message">
        We are currently evaluating your document. This process may take approximately 2-3 business days. We appreciate your patience and understanding during this time.
      </p>

      <p class="owner-evaluation-whatsapp-text">
        To receive updates on the result, please provide your WhatsApp number
      </p>

      <form class="owner-evaluation-whatsapp-form" action="#" method="post">
        <label class="owner-evaluation-whatsapp-label" for="owner-whatsapp-number">WhatsApp number</label>
        <div class="owner-evaluation-whatsapp-field">
          <span class="owner-evaluation-country-code" aria-hidden="true">
            <span class="owner-evaluation-code-text">+91</span>
            <span class="owner-evaluation-flag" title="India">
              <span class="owner-evaluation-flag-symbol"></span>
            </span>
          </span>
          <input
            id="owner-whatsapp-number"
            type="tel"
            inputmode="numeric"
            autocomplete="tel-national"
            class="owner-evaluation-whatsapp-input"
            placeholder="Enter WhatsApp number"
          >
        </div>
        <button type="submit" class="owner-evaluation-whatsapp-submit">Submit WhatsApp Number</button>
      </form>
    </section>
  </main>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const form = document.querySelector('.owner-evaluation-whatsapp-form');
      const input = document.getElementById('owner-whatsapp-number');
      const submitButton = document.querySelector('.owner-evaluation-whatsapp-submit');
      const apiBaseMetaTag = document.querySelector('meta[name="api-base-url"]');
      const pageParams = new URLSearchParams(window.location.search);
      const apiBaseFromMeta = apiBaseMetaTag ? String(apiBaseMetaTag.getAttribute('content') || '').trim() : '';
      const apiBaseFromSession = String(sessionStorage.getItem('owner-api-base-url') || '').trim();
      const currentOrigin = /^https?:/i.test(window.location.origin || '') ? String(window.location.origin || '').trim() : '';
      const apiBaseUrl = apiBaseFromMeta || 'https://go-kerala-backend.onrender.com';
      
      // Debug: Log the API URL being used
      console.log('API Base URL:', apiBaseUrl);
      console.log('Meta tag content:', apiBaseFromMeta);
      
      // Test connection immediately
      fetch(apiBaseUrl + '/api/health')
        .then(response => response.json())
        .then(data => console.log('Backend health check:', data))
        .catch(error => console.error('Backend health check failed:', error));
      const reviewItem = String(pageParams.get('review') || '').trim();
      const returnPage = String(pageParams.get('return') || '').trim() || 'owner-details-done.html';
      const isWhatsappReview = reviewItem === 'owner-whatsapp-number';
      const blockedKeys = [
        /password/i,
        /authenticated/i,
        /api-base-url/i,
        /account-created/i,
        /login-/i
      ];
      const mediaFieldKeys = [
        'owner-profile-photo',
        'owner-heavy-licence-photo-url-1',
        'owner-heavy-licence-photo-url-2',
        'owner-aadhaar-photo-url'
      ];

      if (!form || !input || !submitButton) {
        return;
      }

      input.maxLength = 10;
      input.value = String(sessionStorage.getItem('owner-whatsapp-number') || '').replace(/^\+91/, '');

      // Display all stored owner data for user reference
      displayStoredOwnerData();

      function normalizeWhatsappNumber(value) {
        const digitsOnly = String(value || '').replace(/\D/g, '');

        if (!digitsOnly) {
          return '';
        }

        if (digitsOnly.length === 10) {
          return '+91' + digitsOnly;
        }

        if (digitsOnly.length === 12 && digitsOnly.startsWith('91')) {
          return '+' + digitsOnly;
        }

        return '';
      }

      function isValidWhatsappNumber(value) {
        const normalized = normalizeWhatsappNumber(value);
        return /^\+\d{10,15}$/.test(normalized);
      }

      function shouldKeepKey(key) {
        if (!/^owner-/i.test(key)) {
          return false;
        }

        return !blockedKeys.some(function (pattern) {
          return pattern.test(key);
        });
      }

      function loadBackupFields() {
        try {
          const rawBackup = String(localStorage.getItem('owner-form-backup-v1') || '').trim();

          if (!rawBackup) {
            return {};
          }

          const parsed = JSON.parse(rawBackup);

          if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
            return {};
          }

          return Object.keys(parsed).reduce(function (accumulator, key) {
            if (shouldKeepKey(key)) {
              accumulator[key] = parsed[key];
            }

            return accumulator;
          }, {});
        } catch (error) {
          return {};
        }
      }

      function displayStoredOwnerData() {
        const storedData = {};
        
        // Collect all owner data from sessionStorage
        for (let i = 0; i < sessionStorage.length; i++) {
          const key = sessionStorage.key(i);
          if (key && key.startsWith('owner-') && !blockedKeys.some(pattern => pattern.test(key))) {
            storedData[key] = sessionStorage.getItem(key);
          }
        }
        
        // Collect all owner data from localStorage
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('owner-') && !blockedKeys.some(pattern => pattern.test(key))) {
            storedData[key] = localStorage.getItem(key);
          }
        }
        
        // Display stored data in console for debugging
        if (Object.keys(storedData).length > 0) {
          console.log('Stored Owner Data:', storedData);
          
          // You can also display this data on the page if needed
          // For example, create a summary section
          const dataSummary = Object.entries(storedData)
            .map(([key, value]) => {
              const displayName = key.replace('owner-', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
              return `${displayName}: ${value}`;
            })
            .join('\n');
          
          console.log('Owner Data Summary:\n' + dataSummary);
        } else {
          console.log('No stored owner data found');
        }
      }

      function clearOwnerData() {
        // Clear ALL owner-related data from sessionStorage
        for (let i = sessionStorage.length - 1; i >= 0; i--) {
          const key = sessionStorage.key(i);
          if (key && key.startsWith('owner-')) {
            console.log('Clearing sessionStorage:', key);
            sessionStorage.removeItem(key);
          }
        }
        
        // Clear ALL owner-related data from localStorage
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);
          if (key && key.startsWith('owner-')) {
            console.log('Clearing localStorage:', key);
            localStorage.removeItem(key);
          }
        }
        
        // Clear any uploaded photos from uploads directory
        const photoKeys = [
          'owner-profile-photo-url',
          'owner-aadhaar-photo-url',
          'owner-pan-photo-url',
          'owner-gst-photo-url',
          'owner-company-logo-url'
        ];
        
        photoKeys.forEach(key => {
          if (sessionStorage.getItem(key)) {
            console.log('Clearing photo:', key);
            sessionStorage.removeItem(key);
          }
          if (localStorage.getItem(key)) {
            console.log('Clearing photo:', key);
            localStorage.removeItem(key);
          }
        });
        
        // Clear any form backup data
        if (sessionStorage.getItem('owner-form-backup')) {
          console.log('Clearing form backup');
          sessionStorage.removeItem('owner-form-backup');
        }
        
        // Clear any session tokens
        if (sessionStorage.getItem('owner-last-page')) {
          sessionStorage.removeItem('owner-last-page');
        }
        
        console.log('ALL owner data cleared after WhatsApp submission');
        
        // Clear the WhatsApp input field
        if (input) {
          input.value = '';
        }
      }

      function collectStorage(source) {
        const data = {};

        for (let index = 0; index < source.length; index += 1) {
          const key = source.key(index);

          if (!key || !shouldKeepKey(key)) {
            continue;
          }

          data[key] = source.getItem(key);
        }

        return data;
      }

      function getApiUrl(pathName) {
        return apiBaseUrl ? apiBaseUrl + pathName : pathName;
      }

      const backendHealthUrl = getApiUrl('/api/health');

      function setSubmitState(isLoading, message) {
        submitButton.disabled = isLoading;
        submitButton.textContent = message || (isLoading ? 'Connecting...' : 'Submit WhatsApp Number');
      }

      function getNetworkErrorMessage() {
        const backendHost = apiBaseUrl || 'the server';
        return 'Unable to reach ' + backendHost + ' right now. Please check your connection and try again. If this keeps happening, backend may be sleeping or unavailable.';
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          window.setTimeout(resolve, ms);
        });
      }

      async function fetchJsonWithRetry(url, options, retryDelays) {
        try {
          const response = await fetch(url, options);
          
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          
          const text = await response.text();
          let data = {};

          try {
            data = text ? JSON.parse(text) : {};
          } catch (error) {
            data = text ? { error: text } : {};
          }

          return {
            ok: response.ok,
            status: response.status,
            data: data
          };
        } catch (error) {
          console.error('Fetch error:', error);
          throw error;
        }
      }

      async function submitSubmission() {
        const rawWhatsappNumber = String(input.value || '').trim();

        if (!rawWhatsappNumber) {
          input.focus();
          throw new Error('Please enter your WhatsApp number.');
        }

        if (!isValidWhatsappNumber(rawWhatsappNumber)) {
          input.focus();
          throw new Error('Please enter a valid WhatsApp number.');
        }

        const whatsappNumber = normalizeWhatsappNumber(rawWhatsappNumber);
        sessionStorage.setItem('owner-whatsapp-number', whatsappNumber);
        input.value = rawWhatsappNumber.replace(/\D/g, '').slice(0, 10);

        const mediaFields = {};

        if (window.ownerMediaStore) {
          await Promise.all(mediaFieldKeys.map(function (key) {
            return window.ownerMediaStore.getItem(key)
              .then(function (value) {
                if (value) {
                  mediaFields[key] = value;
                }
              })
              .catch(function () {
                // Ignore missing local media and continue with the rest of the submission.
              });
          }));
        }

        // Collect ALL stored data before submission
        const allStoredData = {};
        
        // Collect from sessionStorage
        for (let i = 0; i < sessionStorage.length; i++) {
          const key = sessionStorage.key(i);
          if (key && key.startsWith('owner-') && !blockedKeys.some(pattern => pattern.test(key))) {
            allStoredData[key] = sessionStorage.getItem(key);
          }
        }
        
        // Collect from localStorage
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith('owner-') && !blockedKeys.some(pattern => pattern.test(key))) {
            allStoredData[key] = localStorage.getItem(key);
          }
        }

        Object.assign(allStoredData, loadBackupFields());
        Object.assign(allStoredData, mediaFields);

        const payloadFields = Object.assign({}, allStoredData, {
          'owner-whatsapp-number': whatsappNumber
        });

        const payload = {
          whatsappNumber: whatsappNumber,
          sourcePage: 'owner-details-wait.html',
          fields: payloadFields
        };

        // Debug: Log the API URL and payload
        console.log('Submitting to:', getApiUrl('/api/submissions'));
        console.log('Payload:', payload);

        try {
          const result = await fetchJsonWithRetry(getApiUrl('/api/submissions'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          console.log('API Response:', result);

          if (!result.ok || !result.data.success) {
            let errorMessage = 'Unable to save submission.';

            if (result.data && result.data.error) {
              errorMessage = String(result.data.error);
            }

            throw new Error(errorMessage);
          }

          const submissionId = String(result.data && result.data.submission && result.data.submission.id || '').trim();

          if (submissionId) {
            const syncResponse = await fetchJsonWithRetry(getApiUrl('/api/submissions/' + encodeURIComponent(submissionId) + '/owner-update'), {
              method: 'PATCH',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                fields: payloadFields,
                whatsappNumber: whatsappNumber
              })
            });

            console.log('Owner update response:', syncResponse);

            if (!syncResponse.ok || !syncResponse.data.success) {
              let syncErrorMessage = 'Unable to sync submission details.';

              if (syncResponse.data && syncResponse.data.error) {
                syncErrorMessage = String(syncResponse.data.error);
              }

              throw new Error(syncErrorMessage);
            }
          } else {
            console.warn('No submission ID returned from create request; skipping owner-update sync.');
          }
        } catch (error) {
          console.error('Submission Error Details:', {
            message: error.message,
            name: error.name,
            stack: error.stack
          });
          
          if (error && error.message && /fetch failed|network request failed|failed to fetch/i.test(error.message)) {
            throw new Error(getNetworkErrorMessage());
          }

          throw error;
        }
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        setSubmitState(true, 'Submitting...');

        Promise.resolve(submitSubmission())
          .then(function () {
            // Reset all stored data after successful submission
            clearOwnerData();
            
            if (isWhatsappReview) {
              if (returnPage === 'owner-details-done.html') {
                sessionStorage.setItem('owner-review-done-allowed', 'yes');
              }
              window.location.href = returnPage;
              return;
            }

            sessionStorage.setItem('owner-final-submission-done-allowed', 'yes');
            window.location.href = 'owner-details-done.html';
          })
          .catch(function (error) {
            setSubmitState(false);
            window.alert(error.message || 'Unable to save submission.');
          });
      });

      setSubmitState(false);

      input.addEventListener('input', function () {
        const sanitized = String(input.value || '').replace(/\D/g, '').slice(0, 10);
        if (sanitized !== input.value) {
          input.value = sanitized;
        }
      });
    })();
  </script>
</body>
</html>
