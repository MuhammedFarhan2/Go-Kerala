<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Evaluation</title>
  <meta name="api-base-url" content="https://go-kerala-backend.onrender.com">
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260413-1">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-blank-main owner-evaluation-main">
    <section class="owner-evaluation-card" aria-label="Document evaluation in progress">
      <div class="owner-evaluation-icon-wrap" aria-hidden="true">
        <span class="owner-evaluation-icon">
          <svg viewBox="0 0 24 24" fill="none" role="img" aria-label="Clock icon">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"></circle>
            <path d="M12 7.7v4.7l3.2 1.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
      </div>

      <p class="owner-evaluation-message">
        We are currently evaluating your document. This process may take approximately 2-3 business days. We appreciate your patience and understanding during this time.
      </p>

      <p class="owner-evaluation-whatsapp-text">
        To receive updates on the result, please provide your WhatsApp number
      </p>

      <form class="owner-evaluation-whatsapp-form" action="#" method="post">
        <label class="owner-evaluation-whatsapp-label" for="owner-whatsapp-number">WhatsApp number</label>
        <div class="owner-evaluation-whatsapp-field">
          <span class="owner-evaluation-country-code" aria-hidden="true">
            <span class="owner-evaluation-code-text">+91</span>
            <span class="owner-evaluation-flag" title="India">
              <span class="owner-evaluation-flag-symbol"></span>
            </span>
          </span>
          <input
            id="owner-whatsapp-number"
            type="tel"
            inputmode="numeric"
            autocomplete="tel-national"
            class="owner-evaluation-whatsapp-input"
            placeholder="Enter WhatsApp number"
          >
        </div>
        <button type="submit" class="owner-evaluation-whatsapp-submit">Submit WhatsApp Number</button>
      </form>
    </section>
  </main>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const form = document.querySelector('.owner-evaluation-whatsapp-form');
      const input = document.getElementById('owner-whatsapp-number');
      const submitButton = document.querySelector('.owner-evaluation-whatsapp-submit');
      const apiBaseMetaTag = document.querySelector('meta[name="api-base-url"]');
      const pageParams = new URLSearchParams(window.location.search);
      const apiBaseFromSession = String(sessionStorage.getItem('owner-api-base-url') || '').trim();
      const apiBaseFromMeta = apiBaseMetaTag ? String(apiBaseMetaTag.getAttribute('content') || '').trim() : '';
      const currentOrigin = /^https?:/i.test(window.location.origin || '') ? String(window.location.origin || '').trim() : '';
      const apiBaseUrl = (apiBaseFromSession || apiBaseFromMeta || currentOrigin).replace(/\/$/, '');
      const reviewItem = String(pageParams.get('review') || '').trim();
      const returnPage = String(pageParams.get('return') || '').trim() || 'owner-details-done.html';
      const isWhatsappReview = reviewItem === 'owner-whatsapp-number';
      const backendHealthUrl = getApiUrl('/api/health');
      const blockedKeys = [
        /password/i,
        /authenticated/i,
        /api-base-url/i,
        /account-created/i,
        /login-/i
      ];
      const mediaFieldKeys = [
        'owner-profile-photo',
        'owner-heavy-licence-photo-url-1',
        'owner-heavy-licence-photo-url-2',
        'owner-aadhaar-photo-url'
      ];

      if (!form || !input || !submitButton) {
        return;
      }

      input.maxLength = 10;
      input.value = String(sessionStorage.getItem('owner-whatsapp-number') || '').replace(/^\+91/, '');

      function normalizeWhatsappNumber(value) {
        const digitsOnly = String(value || '').replace(/\D/g, '');

        if (!digitsOnly) {
          return '';
        }

        if (digitsOnly.length === 10) {
          return '+91' + digitsOnly;
        }

        if (digitsOnly.length === 12 && digitsOnly.startsWith('91')) {
          return '+' + digitsOnly;
        }

        return '';
      }

      function isValidWhatsappNumber(value) {
        return /^\+91\d{10}$/.test(normalizeWhatsappNumber(value));
      }

      function shouldKeepKey(key) {
        if (!/^owner-/i.test(key)) {
          return false;
        }

        return !blockedKeys.some(function (pattern) {
          return pattern.test(key);
        });
      }

      function collectStorage(source) {
        const data = {};

        for (let index = 0; index < source.length; index += 1) {
          const key = source.key(index);

          if (!key || !shouldKeepKey(key)) {
            continue;
          }

          data[key] = source.getItem(key);
        }

        return data;
      }

      function getApiUrl(pathName) {
        return apiBaseUrl ? apiBaseUrl + pathName : pathName;
      }

      function setSubmitState(isLoading, message) {
        submitButton.disabled = isLoading;
        submitButton.textContent = message || (isLoading ? 'Connecting...' : 'Submit WhatsApp Number');
      }

      function getNetworkErrorMessage() {
        const backendHost = apiBaseUrl || 'the server';
        return 'Unable to reach the server right now. Please check your connection and try again. If this keeps happening, the backend may be sleeping or unavailable at ' + backendHost + '.';
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          window.setTimeout(resolve, ms);
        });
      }

      async function fetchJsonWithRetry(url, options, retryDelays) {
        const delays = Array.isArray(retryDelays) && retryDelays.length ? retryDelays : [3000, 6000, 10000, 15000, 20000, 25000];
        let lastError = null;

        for (let attempt = 0; attempt <= delays.length; attempt += 1) {
          try {
            const response = await fetch(url, options);
            const text = await response.text();
            let data = {};

            try {
              data = text ? JSON.parse(text) : {};
            } catch (error) {
              data = text ? { error: text } : {};
            }

            return {
              ok: response.ok,
              status: response.status,
              data: data
            };
          } catch (error) {
            lastError = error;

            if (attempt < delays.length) {
              await wait(delays[attempt]);
            }
          }
        }

        throw lastError || new Error('Network request failed.');
      }

      async function warmBackend() {
        await fetchJsonWithRetry(backendHealthUrl, {
          method: 'GET',
          cache: 'no-store'
        }, [3000, 6000, 10000, 15000, 20000, 25000]);
      }

      async function submitSubmission() {
        const rawWhatsappNumber = String(input.value || '').trim();

        if (!rawWhatsappNumber) {
          input.focus();
          throw new Error('Please enter your WhatsApp number.');
        }

        if (!isValidWhatsappNumber(rawWhatsappNumber)) {
          input.focus();
          throw new Error('Please enter a valid WhatsApp number.');
        }

        const whatsappNumber = normalizeWhatsappNumber(rawWhatsappNumber);
        sessionStorage.setItem('owner-whatsapp-number', whatsappNumber);
        input.value = rawWhatsappNumber.replace(/\D/g, '').slice(0, 10);

        const mediaFields = {};

        if (window.ownerMediaStore) {
          await Promise.all(mediaFieldKeys.map(function (key) {
            return window.ownerMediaStore.getItem(key)
              .then(function (value) {
                if (value) {
                  mediaFields[key] = value;
                }
              })
              .catch(function () {
                // Ignore missing local media and continue with the rest of the submission.
              });
          }));
        }

        const payload = {
          whatsappNumber: whatsappNumber,
          sourcePage: 'owner-details-wait.html',
          fields: Object.assign({}, collectStorage(sessionStorage), collectStorage(localStorage), mediaFields, {
            'owner-whatsapp-number': whatsappNumber
          })
        };

        try {
          const result = await fetchJsonWithRetry(getApiUrl('/api/submissions'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!result.ok) {
            let errorMessage = 'Unable to save submission.';

            if (result.data && result.data.error) {
              errorMessage = String(result.data.error);
            }

            throw new Error(errorMessage);
          }
        } catch (error) {
          if (error && error.message && /fetch failed|network request failed|failed to fetch/i.test(error.message)) {
            throw new Error(getNetworkErrorMessage());
          }

          throw error;
        }
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        setSubmitState(true, 'Submitting...');

        Promise.resolve(warmBackend())
          .then(function () {
            setSubmitState(true, 'Submitting...');
            return submitSubmission();
          })
          .then(function () {
            if (isWhatsappReview) {
              if (returnPage === 'owner-details-done.html') {
                sessionStorage.setItem('owner-review-done-allowed', 'yes');
              }
              window.location.href = returnPage;
              return;
            }

            sessionStorage.setItem('owner-final-submission-done-allowed', 'yes');
            window.location.href = 'owner-details-done.html';
          })
          .catch(function (error) {
            setSubmitState(false);
            window.alert(error.message || 'Unable to save submission.');
          });
      });

      setSubmitState(true, 'Waking server...');
      Promise.resolve(warmBackend())
        .then(function () {
          setSubmitState(false);
        })
        .catch(function () {
          setSubmitState(false);
        });

      input.addEventListener('input', function () {
        const sanitized = String(input.value || '').replace(/\D/g, '').slice(0, 10);
        if (sanitized !== input.value) {
          input.value = sanitized;
        }
      });
    })();
  </script>
</body>
</html>
