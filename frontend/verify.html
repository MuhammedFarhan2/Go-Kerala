<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <meta name="api-base-url" content="https://go-kerala-backend.onrender.com">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="style.css?v=20260430-2">
  </head>
  <body>
    <header class="header owner-auth-header">
      <div class="owner-auth-brand-lockup">
        <h1 class="logo owner-auth-logo">VECT</h1>
        <p class="owner-auth-logo-sub">MOVERS</p>
      </div>
    </header>

    <main class="owner-main owner-auth-main">
      <section class="owner-auth-shell owner-auth-shell--verify" aria-label="Verify account">
        <div class="owner-auth-visual" aria-hidden="true">
          <div class="swiper owner-auth-banner" id="verifyBanner" aria-label="Verification page banner slider">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <div class="owner-auth-banner-card">
                  <img
                    class="owner-auth-banner-img"
                    src="https://picsum.photos/id/1011/1400/700"
                    alt="Banner slide 1"
                    loading="lazy"
                  >
                </div>
              </div>
              <div class="swiper-slide">
                <div class="owner-auth-banner-card">
                  <img
                    class="owner-auth-banner-img"
                    src="https://picsum.photos/id/1025/1400/700"
                    alt="Banner slide 2"
                    loading="lazy"
                  >
                </div>
              </div>
              <div class="swiper-slide">
                <div class="owner-auth-banner-card">
                  <img
                    class="owner-auth-banner-img"
                    src="https://picsum.photos/id/1035/1400/700"
                    alt="Banner slide 3"
                    loading="lazy"
                  >
                </div>
              </div>
            </div>
            <div class="swiper-pagination owner-auth-banner-pagination" aria-label="Slider navigation dots"></div>
          </div>
        </div>

        <div class="owner-auth-panel owner-auth-verify-panel">
          <div class="owner-auth-panel-head">
            <h1 class="owner-auth-title">Email verification</h1>
            <p class="owner-auth-subtitle" data-verify-subtitle>Enter the OTP sent to your email.</p>
          </div>

          <form class="owner-auth-form" data-verify-form novalidate>
            <label class="owner-auth-field">
              <span class="owner-auth-field-label">OTP code</span>
              <input
                type="text"
                class="owner-auth-input"
                placeholder="Enter 4-digit OTP"
                inputmode="numeric"
                autocomplete="one-time-code"
                maxlength="6"
                data-verify-otp
              >
            </label>

            <p class="owner-auth-error" data-verify-error hidden></p>

            <button type="submit" class="owner-auth-submit">Verify OTP</button>
            <button type="button" class="owner-auth-submit owner-auth-submit-secondary" data-resend-btn>Resend OTP</button>
          </form>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
      (function () {
        const verifyBannerNode = document.getElementById('verifyBanner');
        const verifyForm = document.querySelector('[data-verify-form]');
        const otpInput = document.querySelector('[data-verify-otp]');
        const errorNode = document.querySelector('[data-verify-error]');
        const subtitleNode = document.querySelector('[data-verify-subtitle]');
        const resendBtn = document.querySelector('[data-resend-btn]');
        const apiBaseMetaTag = document.querySelector('meta[name="api-base-url"]');
        const pageParams = new URLSearchParams(window.location.search);
        const email = String(sessionStorage.getItem('owner-email') || '').trim();
        const apiBaseFromMeta = apiBaseMetaTag ? String(apiBaseMetaTag.getAttribute('content') || '').trim() : '';
        const apiBaseFromStorage = String(sessionStorage.getItem('owner-api-base-url') || '').trim();
        const currentOrigin = /^https?:/i.test(window.location.origin || '') ? String(window.location.origin || '').trim().replace(/\/$/, '') : '';
        const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/i.test(window.location.hostname || '');
        const apiBaseUrl = apiBaseFromMeta || 'https://go-kerala-backend.onrender.com';
        const reviewItem = String(pageParams.get('review') || sessionStorage.getItem('owner-review-item') || '').trim();
        const returnPage = String(pageParams.get('return') || sessionStorage.getItem('owner-review-return-page') || '').trim() || 'owner-details-done.html';
        const isEmailReview = reviewItem === 'owner-email';

        if (!verifyForm || !otpInput || !errorNode) {
          return;
        }

        if (verifyBannerNode && typeof window.Swiper === 'function') {
          new window.Swiper(verifyBannerNode, {
            loop: true,
            speed: 900,
            autoplay: {
              delay: 3000,
              disableOnInteraction: false
            },
            pagination: {
              el: '.owner-auth-banner-pagination',
              clickable: true
            }
          });
        }

        function getApiUrl(pathName) {
          if (!apiBaseUrl) {
            return pathName;
          }

          return apiBaseUrl + pathName;
        }

        function wait(ms) {
          return new Promise(function (resolve) {
            window.setTimeout(resolve, ms);
          });
        }

        async function fetchJsonWithRetry(url, options, retryDelays) {
        try {
          const response = await fetch(url, options);
          const text = await response.text();
          let data = {};

          try {
            data = text ? JSON.parse(text) : {};
          } catch (error) {
            data = text ? { error: text } : {};
          }

          return {
            ok: response.ok,
            status: response.status,
            data: data
          };
        } catch (error) {
          console.error('Fetch error:', error);
          throw error;
        }
      }

        function hideError() {
          errorNode.hidden = true;
          errorNode.textContent = '';
        }

        function showError(message) {
          errorNode.textContent = message;
          errorNode.hidden = false;
        }

        if (!email) {
          showError('Session expired. Please go back and request OTP again.');
          verifyForm.querySelector('button[type="submit"]').disabled = true;
          if (resendBtn) {
            resendBtn.disabled = true;
          }
          return;
        }

        if (subtitleNode) {
          subtitleNode.textContent = isEmailReview
            ? 'Enter the OTP sent to your updated email ' + email + '.'
            : 'Enter the OTP sent to ' + email + '.';
        }

        otpInput.addEventListener('input', function () {
          const cleaned = otpInput.value.replace(/[^0-9]/g, '');
          if (otpInput.value !== cleaned) {
            otpInput.value = cleaned;
          }
          hideError();
        });

        verifyForm.addEventListener('submit', function (event) {
          event.preventDefault();
          const code = String(otpInput.value || '').trim();

          if (!code) {
            showError('Please enter OTP code.');
            otpInput.focus();
            return;
          }

          fetchJsonWithRetry(getApiUrl('/api/auth/verify-otp'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contact: email,
              code: code
            })
          })
            .then(function (result) {
              if (!result.ok) {
                throw new Error((result.data && result.data.error) || 'OTP verification failed.');
              }

              localStorage.setItem('owner-authenticated', 'true');
              if (isEmailReview) {
                sessionStorage.removeItem('owner-review-item');
                sessionStorage.removeItem('owner-review-return-page');
                if (returnPage === 'owner-details-done.html') {
                  sessionStorage.setItem('owner-review-done-allowed', 'yes');
                }
                window.location.href = returnPage;
                return;
              }

              window.location.href = 'owner-account-setup.html';
            })
            .catch(function (error) {
              showError(error.message || 'OTP verification failed.');
            });
        });

        if (resendBtn) {
          resendBtn.addEventListener('click', function () {
            fetchJsonWithRetry(getApiUrl('/api/auth/request-otp'), {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contact: email
              })
            })
              .then(function (result) {
                if (!result.ok) {
                  throw new Error((result.data && result.data.error) || 'Unable to resend OTP.');
                }

                hideError();
                otpInput.value = '';
                otpInput.focus();
              })
              .catch(function (error) {
                showError(error.message || 'Unable to resend OTP.');
              });
          });
        }
      })();
    </script>
  </body>
</html>
