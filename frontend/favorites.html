<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260611-2">
  <meta name="google-signin-client_id" content="743689462629-ogfmkvkp39jsk49piia08ffsmsrh8qus.apps.googleusercontent.com">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
    <nav class="header-switch" aria-label="Site switch" data-customer-header-links>
      <a class="header-switch-link header-switch-link--login" href="customer-login.html" aria-label="Open login page">Log in</a>
      <a class="header-switch-link header-switch-link--signup" href="customer-signup.html" aria-label="Open create account page">Sign up</a>
    </nav>
    <button type="button" class="customer-account-btn" id="customer-account-btn" hidden aria-label="Open customer account">
      <svg xmlns="http://www.w3.org/2000/svg" width="35" height="30" viewBox="0 0 24 24">
        <defs>
          <clipPath id="circle-clip-submit">
            <circle cx="12" cy="12" r="11.75"></circle>
          </clipPath>
        </defs>
        <g clip-path="url(#circle-clip-submit)">
          <circle cx="17.5" cy="6.5" r="2.0" fill="#111"></circle>
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="#111"></path>
        </g>
      </svg>
    </button>
  </header>

  <main class="favorites-main">
    <section class="favorites-shell">
      <div class="favorites-list" data-favorites-list></div>
    </section>
  </main>

  <script>
    (function () {
      const pageName = 'favorites.html';
      const FAVORITES_STORAGE_KEY = 'vect-favorites-v1';
      const accountBtn = document.getElementById('customer-account-btn');
      const headerLinks = document.querySelector('[data-customer-header-links]');
      const loginLink = headerLinks ? headerLinks.querySelector('.header-switch-link--login') : null;
      const signupLink = headerLinks ? headerLinks.querySelector('.header-switch-link--signup') : null;
      const favoritesList = document.querySelector('[data-favorites-list]');

      function buildAuthUrl(base) {
        const url = new URL(base, window.location.href);
        url.searchParams.set('return', pageName);
        return url.toString();
      }

      function renderHeaderState() {
        const signedIn = localStorage.getItem('customer-authenticated') === 'true';

        if (accountBtn) {
          accountBtn.hidden = !signedIn;
        }

        if (headerLinks) {
          headerLinks.hidden = signedIn;
          headerLinks.style.display = signedIn ? 'none' : '';
        }

        if (loginLink) {
          loginLink.href = buildAuthUrl('customer-login.html');
        }

        if (signupLink) {
          signupLink.href = buildAuthUrl('customer-signup.html');
        }
      }

      function loadFavorites() {
        try {
          const raw = localStorage.getItem(FAVORITES_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function resolveFavoritePlace(item) {
        return String(item && (item.place || item.location || item.locationText) || '').trim();
      }

      function resolveFavoriteDealer(item, metaParts) {
        const dealer = String(item && (item.dealer || item.dealerName) || '').trim();
        if (dealer) {
          return dealer;
        }
        if (Array.isArray(metaParts)) {
          const dealerMeta = metaParts.find(function (part) {
            return /dealer\s*:/i.test(String(part || ''));
          });
          if (dealerMeta) {
            return String(dealerMeta).replace(/^dealer\s*:\s*/i, '').trim();
          }
        }
        return 'abc';
      }

      function resolveFavoriteSpecs(item, metaParts) {
        if (Array.isArray(item && item.specs) && item.specs.length) {
          return item.specs.filter(Boolean).slice(0, 3);
        }

        const cleaned = Array.isArray(metaParts) ? metaParts.filter(Boolean) : [];
        return cleaned.slice(0, 3);
      }

      function buildFavoriteCard(item) {
        const title = String(item && item.title || 'Saved vehicle').trim() || 'Saved vehicle';
        const image = String(item && item.image || '').trim();
        const alt = String(item && item.alt || title).trim();
        const metaParts = Array.isArray(item && item.meta) ? item.meta.filter(Boolean) : [];
        const place = resolveFavoritePlace(item) || (metaParts.length ? String(metaParts[metaParts.length - 1] || '').trim() : '');
        const dealer = resolveFavoriteDealer(item, metaParts);
        const specs = resolveFavoriteSpecs(item, metaParts);
        const sourceScope = String(item && (item.scope || item.id) || '').trim();
        const viewPayload = {
          title: title,
          dealer: dealer,
          place: place,
          specs: specs,
          image: image,
          scope: sourceScope
        };

        return [
          '<article class="submit-demo-card favorites-demo-card" data-favorite-card data-favorite-id="' + escapeHtml(item && item.id) + '" data-favorite-payload="' + escapeHtml(JSON.stringify(viewPayload)) + '">',
          '  <button type="button" class="demo-favorite-heart is-selected" data-favorite-remove aria-pressed="true" aria-label="Remove favorite">',
          '    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">',
          '      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>',
          '    </svg>',
          '  </button>',
          '  <div class="submit-demo-card-main">',
          '    <div class="submit-demo-image-wrap">',
          image ? '      <img class="submit-demo-image" src="' + escapeHtml(image) + '" alt="' + escapeHtml(alt) + '">' : '      <div class="submit-demo-image submit-demo-image--placeholder"></div>',
          '    </div>',
          '    <div class="submit-demo-content">',
          '      <div class="submit-demo-topline">',
          '        <h3 class="submit-demo-title">' + escapeHtml(title) + '</h3>',
          '      </div>',
          '      <p class="submit-demo-dealer">Dealer : ' + escapeHtml(dealer) + '</p>',
          '      <ul class="submit-demo-specs" aria-label="Vehicle features">',
          specs.map(function (spec) {
            return '<li class="submit-demo-spec">' + escapeHtml(spec) + '</li>';
          }).join(''),
          '      </ul>',
          '      <div class="submit-demo-location-icon" aria-label="Location icon">',
          '        <img src="location-2955.svg" alt="" class="submit-demo-location-image" />',
          '        <span class="submit-demo-place">' + escapeHtml(place || 'Location') + '</span>',
          '      </div>',
          '    </div>',
          '  </div>',
          '  <div class="submit-demo-expand" aria-hidden="true">',
          '    <div class="submit-demo-expand-inner">',
          '      <div class="submit-demo-expand-actions">',
          '        <button type="button" class="submit-demo-expand-btn is-view" data-favorite-action="view">VIEW</button>',
          '        <button type="button" class="submit-demo-expand-btn is-select" data-favorite-action="select">SELECT</button>',
          '      </div>',
          '    </div>',
          '  </div>',
          '</article>'
        ].join('');
      }

      function renderFavorites() {
        if (!favoritesList) {
          return;
        }

        const favorites = loadFavorites();

        if (!favorites.length) {
          favoritesList.innerHTML = '<p class="favorites-empty-inline">You have not added any favorites yet.</p>';
          return;
        }

        favoritesList.innerHTML = favorites.map(buildFavoriteCard).join('');

        Array.from(favoritesList.querySelectorAll('[data-favorite-remove]')).forEach(function (button) {
          button.addEventListener('click', function (event) {
            event.stopPropagation();
            const card = button.closest('[data-favorite-id]');
            const favoriteId = card ? String(card.getAttribute('data-favorite-id') || '').trim() : '';
            if (!favoriteId) {
              return;
            }

            const updatedFavorites = loadFavorites().filter(function (item) {
              return item.id !== favoriteId;
            });
            localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(updatedFavorites));
            renderFavorites();
          });
        });

        Array.from(favoritesList.querySelectorAll('[data-favorite-card]')).forEach(function (card) {
          card.addEventListener('click', function (event) {
            const actionButton = event.target.closest('[data-favorite-action]');

            if (actionButton) {
              event.stopPropagation();
              const actionType = actionButton.getAttribute('data-favorite-action');

              if (actionType === 'view') {
                const payloadRaw = card.getAttribute('data-favorite-payload') || '{}';
                let payload = {};

                try {
                  payload = JSON.parse(payloadRaw);
                } catch (error) {
                  payload = {};
                }

                sessionStorage.setItem('submit-vehicle-detail', JSON.stringify(payload));
                window.location.href = 'vehicle-detail.html';
                return;
              }

              if (actionType === 'select') {
                const isSelected = !card.classList.contains('is-selected');
                card.classList.toggle('is-selected', isSelected);

                const selectButton = card.querySelector('[data-favorite-action="select"]');
                if (selectButton) {
                  selectButton.classList.toggle('is-active', isSelected);
                  selectButton.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
                  selectButton.textContent = isSelected ? 'DESELECT' : 'SELECT';
                }
                return;
              }
            }

            const shouldExpand = !card.classList.contains('is-expanded');
            favoritesList.querySelectorAll('.submit-demo-card.is-expanded').forEach(function (otherCard) {
              if (otherCard !== card) {
                otherCard.classList.remove('is-expanded');
                const expand = otherCard.querySelector('.submit-demo-expand');
                if (expand) {
                  expand.setAttribute('aria-hidden', 'true');
                }
              }
            });

            card.classList.toggle('is-expanded', shouldExpand);
            const expand = card.querySelector('.submit-demo-expand');
            if (expand) {
              expand.setAttribute('aria-hidden', shouldExpand ? 'false' : 'true');
            }
          });
        });
      }

      renderHeaderState();
      renderFavorites();
      window.addEventListener('storage', renderHeaderState);
      window.addEventListener('storage', renderFavorites);
      window.addEventListener('focus', renderHeaderState);
      window.addEventListener('focus', renderFavorites);
    })();
  </script>
  <script src="script.js?v=20260611-2"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="auth.js"></script>
</body>
</html>
