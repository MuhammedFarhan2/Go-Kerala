<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Kerala</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f4f7f2;
      --card-bg: #ffffff;
      --text: #163024;
      --muted: #557164;
      --accent: #0f8a5f;
      --border: rgba(15, 48, 36, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(15, 138, 95, 0.14), transparent 32%),
        linear-gradient(180deg, #f8fbf7 0%, var(--page-bg) 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .shell {
      min-height: 100vh;
      padding: 18px;
    }

    .frame-card {
      width: 100%;
      height: calc(100vh - 36px);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 24px 60px rgba(9, 31, 23, 0.12);
    }

    .site-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .fallback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(244, 247, 242, 0.96);
    }

    .fallback.is-visible {
      display: flex;
    }

    .fallback-card {
      max-width: 560px;
      padding: 28px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 18px 40px rgba(9, 31, 23, 0.14);
    }

    .fallback-card h1 {
      margin: 0 0 12px;
      font-size: 1.7rem;
    }

    .fallback-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .fallback-card a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .shell {
        padding: 10px;
      }

      .frame-card {
        height: calc(100vh - 20px);
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="frame-card">
      <iframe
        class="site-frame"
        id="site-frame"
        src="https://go-kerala-frontend.onrender.com"
        title="Go Kerala"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>
  </div>

  <div class="fallback" id="iframe-fallback" aria-hidden="true">
    <div class="fallback-card">
      <h1>Open Go Kerala</h1>
      <p>
        If the website does not allow itself to be shown inside this page, use the button below to open it directly.
      </p>
      <a href="https://go-kerala-frontend.onrender.com">Open website</a>
    </div>
  </div>

  <script>
    (function () {
      var frame = document.getElementById('site-frame');
      var fallback = document.getElementById('iframe-fallback');
      var hasLoaded = false;

      if (!frame || !fallback) {
        return;
      }

      frame.addEventListener('load', function () {
        hasLoaded = true;
      });

      window.setTimeout(function () {
        if (!hasLoaded) {
          fallback.classList.add('is-visible');
          fallback.setAttribute('aria-hidden', 'false');
        }
      }, 5000);
    })();
  </script>
</body>
</html>
