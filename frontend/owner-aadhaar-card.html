<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aadhaar Card</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260409-2">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header owner-fixed-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-blank-main">
    <section class="owner-blank-sheet" aria-label="Aadhaar card page">
      <div class="owner-blank-content owner-aadhaar-content">
        <p class="owner-aadhaar-title">Take a photo of your Aadhaar Card</p>

        <div class="owner-aadhaar-card-preview">
          <img
            src="Aadhaar-Card.png"
            alt="Aadhaar card example"
            class="owner-aadhaar-card-image"
          >
        </div>

        <p class="owner-aadhaar-note">
          By sharing your Aadhar details, you hereby confirm that you have shared such detail voluntarily. You further confirm and consent that your Aadhar details may be shared with relevant Government authorities for the purposes provided herein.
        </p>

        <div class="owner-uploaded-list" data-owner-aadhaar-selection hidden>
          <div class="owner-uploaded-list-row">
            <p class="owner-uploaded-list-label" data-owner-aadhaar-status></p>
            <button type="button" class="owner-uploaded-delete owner-uploaded-delete-text" data-owner-aadhaar-delete>Delete</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="owner-heavy-bottom-bar">
    <input
      type="file"
      accept=".jpg,.jpeg,.png,image/jpeg,image/png"
      hidden
      data-owner-aadhaar-upload-input
    >
    <input
      type="file"
      accept=".jpg,.jpeg,.png,image/jpeg,image/png"
      capture="environment"
      hidden
      data-owner-aadhaar-phone-input
    >

    <div class="owner-heavy-upload-menu owner-aadhaar-upload-menu" hidden data-owner-aadhaar-upload-menu>
      <button type="button" class="owner-heavy-upload-option owner-aadhaar-upload-option" data-owner-aadhaar-action="upload-photo">Upload photo</button>
      <button type="button" class="owner-heavy-upload-option owner-aadhaar-upload-option" data-owner-aadhaar-action="use-phone">Take Photo with Back Camera</button>
    </div>

    <button type="button" class="owner-next-btn owner-heavy-add-photo-btn owner-aadhaar-trigger-btn" data-owner-aadhaar-upload-trigger>Add photo</button>
    <button type="button" class="owner-next-btn owner-aadhaar-next-btn" data-owner-aadhaar-next hidden>Next</button>
  </div>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const pageParams = new URLSearchParams(window.location.search);
      const reviewItem = String(pageParams.get('review') || '').trim();
      const returnPage = String(pageParams.get('return') || '').trim() || 'owner-next.html';
      const triggerButton = document.querySelector('[data-owner-aadhaar-upload-trigger]');
      const uploadMenu = document.querySelector('[data-owner-aadhaar-upload-menu]');
      const uploadInput = document.querySelector('[data-owner-aadhaar-upload-input]');
      const phoneInput = document.querySelector('[data-owner-aadhaar-phone-input]');
      const actionButtons = Array.from(document.querySelectorAll('[data-owner-aadhaar-action]'));
      const selectionNode = document.querySelector('[data-owner-aadhaar-selection]');
      const statusNode = document.querySelector('[data-owner-aadhaar-status]');
      const deleteButton = document.querySelector('[data-owner-aadhaar-delete]');
      const nextButton = document.querySelector('[data-owner-aadhaar-next]');
      const STORAGE_KEY = 'owner-aadhaar-photo-name';
      const STORAGE_URL_KEY = 'owner-aadhaar-photo-url';
      const SUBMITTED_KEY = 'owner-aadhaar-submitted-v2';
      const STATUS_KEY = 'owner-aadhaar-status-v2';
      const isAadhaarReview = reviewItem === 'owner-aadhaar-photo-url';
      if (!triggerButton || !uploadMenu || !uploadInput || !phoneInput || !selectionNode || !statusNode || !deleteButton || !nextButton) {
        return;
      }

      function readFileAsDataUrl(file) {
        if (window.ownerMediaTools && typeof window.ownerMediaTools.readOptimizedImage === 'function') {
          return window.ownerMediaTools.readOptimizedImage(file, {
            maxWidth: 1800,
            maxHeight: 1800,
            quality: 0.8,
            mimeType: 'image/jpeg'
          });
        }

        return new Promise(function (resolve, reject) {
          const reader = new FileReader();

          reader.onload = function () {
            resolve(String(reader.result || ''));
          };

          reader.onerror = function () {
            reject(new Error('Unable to read image file.'));
          };

          reader.readAsDataURL(file);
        });
      }

      function closeMenu() {
        uploadMenu.classList.remove('is-open');
        window.setTimeout(function () {
          if (!uploadMenu.classList.contains('is-open')) {
            uploadMenu.hidden = true;
          }
        }, 220);
      }

      function resetSelection() {
        sessionStorage.removeItem(STORAGE_KEY);
        sessionStorage.removeItem('owner-aadhaar-status');
        sessionStorage.removeItem('owner-aadhaar-submitted');
        sessionStorage.removeItem(STATUS_KEY);
        sessionStorage.removeItem(SUBMITTED_KEY);
        statusNode.textContent = '';
        selectionNode.hidden = true;
        triggerButton.hidden = false;
        triggerButton.textContent = 'Add photo';
        nextButton.hidden = true;
        uploadInput.value = '';
        phoneInput.value = '';

        if (window.ownerMediaStore) {
          window.ownerMediaStore.removeItem(STORAGE_URL_KEY);
        }
      }

      async function showSelectedFile(file) {
        if (!file) {
          return;
        }

        if (!['image/jpeg', 'image/png'].includes(file.type)) {
          window.alert('Please upload only JPG, JPEG, or PNG image files.');
          return;
        }

        if (file.size > 5 * 1024 * 1024) {
          window.alert('Image size must be 5MB or less.');
          return;
        }

        triggerButton.disabled = true;
        triggerButton.textContent = 'Uploading...';

        try {
          const imageDataUrl = await readFileAsDataUrl(file);
          sessionStorage.setItem(STORAGE_KEY, file.name);
          if (!window.ownerMediaStore) {
            throw new Error('Image storage is not available on this device.');
          }

          await window.ownerMediaStore.setItem(STORAGE_URL_KEY, imageDataUrl);
          statusNode.textContent = 'Image 1: ' + file.name;
          selectionNode.hidden = false;
          triggerButton.hidden = true;
          nextButton.hidden = false;
        } catch (error) {
          triggerButton.disabled = false;
          triggerButton.textContent = 'Add photo';
          window.alert(error.message || 'Unable to upload image.');
        }
      }

      function restoreSelection() {
        const selectedFileName = sessionStorage.getItem(STORAGE_KEY);

        if (!selectedFileName) {
          resetSelection();
          return;
        }

        statusNode.textContent = 'Image 1: ' + selectedFileName;
        selectionNode.hidden = false;
        triggerButton.hidden = true;
        nextButton.hidden = false;
      }

      function goToNextPage() {
        if (isAadhaarReview && returnPage === 'owner-details-done.html') {
          sessionStorage.setItem('owner-review-done-allowed', 'yes');
        }

        window.location.href = isAadhaarReview ? returnPage : 'owner-next.html';
      }

      triggerButton.addEventListener('click', function () {
        const isOpen = uploadMenu.classList.contains('is-open');

        if (isOpen) {
          closeMenu();
          return;
        }

        uploadMenu.hidden = false;
        window.requestAnimationFrame(function () {
          uploadMenu.classList.add('is-open');
        });
      });

      actionButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          const action = button.getAttribute('data-owner-aadhaar-action');
          closeMenu();

          if (action === 'upload-photo') {
            uploadInput.click();
            return;
          }

          if (action === 'use-phone') {
            phoneInput.click();
          }
        });
      });

      uploadInput.addEventListener('change', function () {
        showSelectedFile(uploadInput.files[0]);
      });

      phoneInput.addEventListener('change', function () {
        showSelectedFile(phoneInput.files[0]);
      });

      deleteButton.addEventListener('click', function () {
        resetSelection();
      });

      nextButton.addEventListener('click', function () {
        sessionStorage.setItem(STATUS_KEY, 'completed');
        sessionStorage.setItem(SUBMITTED_KEY, 'yes');
        goToNextPage();
      });

      document.addEventListener('click', function (event) {
        if (!uploadMenu.classList.contains('is-open')) {
          return;
        }

        if (uploadMenu.contains(event.target) || triggerButton.contains(event.target)) {
          return;
        }

        closeMenu();
      });

      restoreSelection();
    })();
  </script>
</body>
</html>
