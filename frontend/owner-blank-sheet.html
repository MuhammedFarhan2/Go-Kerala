<head>

  <link rel="stylesheet" href="style.css?v=20260414-2">
  <style>
    .owner-blank-header .user-icon {
      width: 44px;
      height: 44px;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      flex: 0 0 auto;
      margin-left: auto;
    }

    .owner-blank-account-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.05);
    }

    .owner-blank-account-name {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 0.02em;
    }

    .owner-blank-account-sub {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #64748b;
      font-weight: 600;
    }

    .owner-blank-account-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: linear-gradient(180deg, #0f172a 0%, #334155 100%);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 10px 24px rgba(15, 23, 42, 0.2);
      overflow: hidden;
    }

    .owner-blank-content {
      padding-top: 28px;
    }

    .owner-calendar-preview {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      color: #111827;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      min-height: 52px;
    }

    .owner-calendar-preview.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .owner-calendar-preview-date {
      font-size: 1rem;
      font-weight: 800;
      color: #0f172a;
    }

    .owner-nav-shell {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding-bottom: 92px;
    }

    .owner-page {
      display: none;
    }

    .owner-page.is-active {
      display: block;
    }

    .owner-page-card {
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.05);
      padding: 18px;
    }

    .owner-add-box {
      min-height: 100px;
      display: grid;
      place-items: center;
      border: 2px solid #111111;
      border-radius: 0;
      background: #ffffff;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.05);
      cursor: pointer;
    }

    .owner-add-preview {
      display: none;
      grid-template-columns: 158px minmax(0, 1fr);
      align-items: stretch;
      gap: 10px;
      min-height: 106px;
      height: auto;
      margin-bottom: 14px;
      padding: 6px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(241, 245, 249, 0.64));
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(18px);
      pointer-events: auto;
      user-select: none;
      overflow: hidden;
      position: relative;
      width: 100%;
      text-align: left;
      cursor: pointer;
      appearance: none;
    }

    .owner-add-preview.is-visible {
      display: grid;
    }

    .owner-add-preview-media {
      width: 100%;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-left: 0;
      border-radius: 0;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.8);
    }

    .owner-add-preview-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: #ffffff;
    }

    .owner-add-preview-image.is-visible {
      display: block;
    }

    .owner-add-preview-placeholder {
      padding: 8px;
      text-align: center;
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1.2;
      color: #6b7280;
    }

    .owner-add-preview-content {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 92px;
      box-sizing: border-box;

      gap: 4px;
      align-content: center;
      padding: 8px 10px;

      font-weight: 800;

    .owner-add-preview-copy {

    .owner-add-preview-meta {

      backdrop-filter: blur(12px);
      border-top: 0;
      box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.08);
      padding: 0;

    .owner-bottom-nav-inner {

    .owner-bottom-tab {
      appearance: none;
      border: 0;
      border-right: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 0;
      background: #fff;

      font-weight: 800;

    .owner-bottom-tab svg {

      width: 34px;
      height: 34px;

    .owner-bottom-tab-label-icon {

      outline-offset: 2px;
    }

    .owner-nav-shell {
      padding-bottom: 62px;
    }
  </style>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const pageParams = new URLSearchParams(window.location.search);
      const reuploadSubmissionId = String(pageParams.get('submissionId') || '').trim();
      const companyNode = document.getElementById('accountCompanyName');
      const profileNode = document.getElementById('accountProfileName');
      const avatarNode = document.getElementById('accountAvatarLarge');
      const closeButton = document.getElementById('account-close');
      const panel = document.getElementById('account-panel');
      const backdrop = document.getElementById('account-backdrop');
      const previewNode = document.getElementById('owner-calendar-preview');
      const previewDateNode = document.getElementById('owner-calendar-preview-date');
      const addPreviewNode = document.getElementById('owner-add-preview');
      const addPreviewEyebrowNode = document.getElementById('owner-add-preview-eyebrow');
      const addPreviewTitleNode = document.getElementById('owner-add-preview-title');
      const addPreviewCopyNode = document.getElementById('owner-add-preview-copy');
      const addPreviewStatusNode = document.getElementById('owner-add-preview-status');
      const addPreviewMetaNode = document.getElementById('owner-add-preview-meta');
      const addPreviewImageNode = document.getElementById('owner-add-preview-image');
      const addPreviewPlaceholderNode = document.getElementById('owner-add-preview-placeholder');
      const tabs = Array.from(document.querySelectorAll('[data-owner-tab]'));
      const pages = Array.from(document.querySelectorAll('[data-owner-page]'));
      const addVehicleTrigger = document.querySelector('[data-open-add-vehicle]');
      const latestVehicleKey = 'owner-latest-vehicle-summary';
      const latestTouristSubmissionKey = 'owner-latest-tourist-submission';
      const latestVehicleStatusKey = 'owner-latest-vehicle-status';
      const reuploadEditableSectionsKey = 'owner-reupload-editable-sections';
      const apiBaseUrl = 'https://go-kerala-backend.onrender.com';
      let previewRenderToken = 0;
      const editableSectionsFromQuery = String(pageParams.get('editable') || '').trim();

      function parseEditableSections(value) {
        const raw = String(value || '').trim();

        if (!raw) {
          return [];
        }

        return raw.split(',').map(function (item) {
          return String(item || '').trim();
        }).filter(Boolean).filter(function (item, index, list) {
          return list.indexOf(item) === index;
        });
      }

      function getEditableSectionsParam() {
        const fromQuery = parseEditableSections(editableSectionsFromQuery);

        if (fromQuery.length) {
          return fromQuery;
        }

        try {
          const stored = JSON.parse(sessionStorage.getItem(reuploadEditableSectionsKey) || '[]');
          return Array.isArray(stored) ? stored.map(function (item) {
            return String(item || '').trim();
          }).filter(Boolean) : [];
        } catch (error) {
          return [];
        }
      }

      function normalizeVehicleStatus(value) {
        const clean = String(value || '').trim().toLowerCase();
        if (clean === 'incomplete' || clean === 'draft') {
          return 'incomplete';
        }
        if (clean === 'accepted' || clean === 'active' || clean === 'online') {
          return 'active';
        }
        if (clean === 'rejected' || clean === 'reject') {
          return 'rejected';
        }
        return 'pending';
      }

      function getVehicleStatusPresentation(status) {
        const safeStatus = normalizeVehicleStatus(status);
        if (safeStatus === 'incomplete') {
          return { label: 'Incomplete', className: '' };
        }
        if (safeStatus === 'active') {
          return { label: 'Active', className: 'is-active' };
        }
        if (safeStatus === 'rejected') {
          return { label: 'Rejected', className: 'is-rejected' };
        }
        return { label: 'Pending', className: '' };
      }

      function setLatestVehicleStatus(status) {
        const normalizedStatus = normalizeVehicleStatus(status);
        sessionStorage.setItem(latestVehicleStatusKey, normalizedStatus);
        localStorage.setItem(latestVehicleStatusKey, normalizedStatus);

        try {
          const previewData = JSON.parse(
            sessionStorage.getItem(latestVehicleKey) ||
            localStorage.getItem(latestVehicleKey) ||
            'null'
          );
          if (previewData && typeof previewData === 'object') {
            previewData.statusLabel = getVehicleStatusPresentation(normalizedStatus).label;
            sessionStorage.setItem(latestVehicleKey, JSON.stringify(previewData));
            localStorage.setItem(latestVehicleKey, JSON.stringify(previewData));
          }
        } catch (error) {
          return;
        }
      }

      function setAvatar(text) {
        const value = String(text || 'VM').trim();
        const initials = value
          .split(/\s+/)
          .map(function (part) {
            return part.charAt(0);
          })
          .slice(0, 2)
          .join('')
          .toUpperCase() || 'VM';

        if (avatarNode) {
          avatarNode.textContent = initials;
        }
      }

      function formatDateKey(dateKey) {
        if (!dateKey) {
          return 'Tap any date';
        }

        const parts = String(dateKey).split('-').map(function (part) {
          return Number(part);
        });

        if (parts.length !== 3 || parts.some(function (part) { return Number.isNaN(part); })) {
          return String(dateKey);
        }

        const date = new Date(parts[0], parts[1] - 1, parts[2]);

        if (Number.isNaN(date.getTime())) {
          return String(dateKey);
        }

        return date.toLocaleDateString([], {
          weekday: 'short',
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        });
      }

      function setActiveOwnerPage(pageName) {
        const nextPage = String(pageName || 'booking');

        tabs.forEach(function (tab) {
          const isActive = tab.getAttribute('data-owner-tab') === nextPage;
          tab.classList.toggle('is-active', isActive);
          tab.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });

        pages.forEach(function (page) {
          const isActive = page.getAttribute('data-owner-page') === nextPage;
          page.classList.toggle('is-active', isActive);
        });
        if (nextPage === 'add-bus') {
          renderLatestVehiclePreview();
        }
      }
      function clearNode(node) {
        while (node && node.firstChild) {
          node.removeChild(node.firstChild);
        }
      }

      function valueToText(value) {
        return String(value || '').trim();
      }

      function getPreviewImageUrl(value) {
        const text = String(value || '').trim();
        const staticAssetFiles = new Set([
          'tour-bus.png',
          'yellow-backhoe-loader.png',
          'Aadhaar-Card.png',
          'yellow-hydraulic-excavator.png',
          'modern-white-box-truck.png',
          'white-flatbed-truck.png',
          'heavy-driving-licence-reference.png',
          'heavy-driving-licence-reference-v2.png',
          'images-3.jpg',
          'profile-photo-reference.avif'
        ]);

        if (!text) {
          return '';
        }

        if (/^data:image\//i.test(text) || /^https?:\/\//i.test(text)) {
          return text;
        }

        if (/^\//.test(text)) {
          return apiBaseUrl + text;
        }

        if (/^(uploads\/).+/i.test(text)) {
          return apiBaseUrl + '/' + text;
        }

        if (staticAssetFiles.has(text)) {
          return text;
        }

        if (/^[a-f0-9]{24,}-\d{10,}\.(png|jpe?g|webp|gif)$/i.test(text)) {
          return apiBaseUrl + '/uploads/' + encodeURIComponent(text);
        }

        if (/^Screenshot-.*-\d{10,}\.(png|jpe?g|webp|gif)$/i.test(text)) {
          return apiBaseUrl + '/uploads/' + encodeURIComponent(text);
        }

        return '';
      }

      function renderPreviewMeta(values) {
        if (!addPreviewMetaNode) {
          return;
        }

        const safeValues = Array.isArray(values) ? values.filter(function (value) {
          return String(value || '').trim();
        }) : [];

        clearNode(addPreviewMetaNode);
        addPreviewMetaNode.hidden = !safeValues.length;

        safeValues.slice(0, 3).forEach(function (value) {
          const chip = document.createElement('span');
          chip.className = 'owner-add-preview-chip';
          chip.textContent = valueToText(value);
          addPreviewMetaNode.appendChild(chip);
        });
      }

      function applyPreviewImage(imageUrl, altText) {
        const safeImageUrl = String(imageUrl || '').trim();
        const safeAltText = String(altText || '').trim();

        if (addPreviewImageNode) {
          addPreviewImageNode.src = safeImageUrl;
          addPreviewImageNode.alt = safeAltText;
          addPreviewImageNode.classList.toggle('is-visible', Boolean(safeImageUrl));
        }

        if (addPreviewPlaceholderNode) {
          addPreviewPlaceholderNode.hidden = Boolean(safeImageUrl);
        }
      }

      function resolveStoredPreviewImage(previewData, latestTouristSubmission) {
        const photoPreviewUrl = String(
          (previewData && previewData.photoPreviewUrl) ||
          (latestTouristSubmission && latestTouristSubmission.bus && latestTouristSubmission.bus.photoPreviewUrl) ||
          (latestTouristSubmission && latestTouristSubmission.summary && latestTouristSubmission.summary.bus && latestTouristSubmission.summary.bus.photoPreviewUrl) ||
          ''
        ).trim();
        const photoPreviewMediaKey = String(
          (previewData && previewData.photoPreviewMediaKey) ||
          (latestTouristSubmission && latestTouristSubmission.bus && latestTouristSubmission.bus.photoPreviewMediaKey) ||
          (latestTouristSubmission && latestTouristSubmission.summary && latestTouristSubmission.summary.bus && latestTouristSubmission.summary.bus.photoPreviewMediaKey) ||
          ''
        ).trim();
        const fallbackPhotos = latestTouristSubmission && latestTouristSubmission.bus && Array.isArray(latestTouristSubmission.bus.photos)
          ? latestTouristSubmission.bus.photos
          : [];
        const previewPhotos = Array.isArray(previewData && previewData.photos) && previewData.photos.length
          ? previewData.photos
          : fallbackPhotos;
        const fallbackImageUrl = getPreviewImageUrl(previewPhotos[0] || '');

        if (photoPreviewUrl) {
          return Promise.resolve(photoPreviewUrl);
        }

        if (photoPreviewMediaKey && window.ownerMediaStore && typeof window.ownerMediaStore.getItem === 'function') {
          return window.ownerMediaStore.getItem(photoPreviewMediaKey).then(function (storedUrl) {
            return String(storedUrl || '').trim() || fallbackImageUrl;
          }).catch(function () {
            return fallbackImageUrl;
          });
        }

        return Promise.resolve(fallbackImageUrl);
      }

      function renderLatestVehiclePreviewLegacy() {
        if (!addPreviewNode || !addPreviewTitleNode || !addPreviewCopyNode) {
          return;
        }

        let previewData = null;
        let latestTouristSubmission = null;

        try {
          previewData = JSON.parse(
            sessionStorage.getItem(latestVehicleKey) ||
            localStorage.getItem(latestVehicleKey) ||
            'null'
          );
        } catch (error) {
          previewData = null;
        }

        try {
          latestTouristSubmission = JSON.parse(
            sessionStorage.getItem(latestTouristSubmissionKey) ||
            localStorage.getItem(latestTouristSubmissionKey) ||
            'null'
          );
        } catch (error) {
          latestTouristSubmission = null;
        }

        if (!previewData) {
          addPreviewNode.hidden = true;
          addPreviewNode.classList.remove('is-visible');
          if (addPreviewTitleNode) {
            addPreviewTitleNode.textContent = 'New vehicle added';
          }
          addPreviewCopyNode.textContent = 'Your latest vehicle details will appear here.';
          if (addPreviewImageNode) {
            addPreviewImageNode.src = '';
            addPreviewImageNode.alt = '';
            addPreviewImageNode.classList.remove('is-visible');
          }
          if (addPreviewPlaceholderNode) {
            addPreviewPlaceholderNode.hidden = false;
          }
          return;
        }

        const fallbackPhotos = latestTouristSubmission && latestTouristSubmission.bus && Array.isArray(latestTouristSubmission.bus.photos)
          ? latestTouristSubmission.bus.photos
          : [];
        const previewPhotos = Array.isArray(previewData.photos) && previewData.photos.length
          ? previewData.photos
          : fallbackPhotos;
        const imageUrl = getPreviewImageUrl(previewPhotos[0] || '');
        const subtitleParts = [
          previewData.place ? String(previewData.place).trim() : '',
          previewData.seats ? String(previewData.seats).trim() + ' seats' : '',
          previewData.permitType ? String(previewData.permitType).trim() : ''
        ].filter(Boolean);

        addPreviewTitleNode.textContent = String(previewData.type || 'Latest vehicle').trim() || 'Latest vehicle';
        addPreviewCopyNode.textContent = subtitleParts.join(' · ') || 'Saved from the latest submit.';

        if (addPreviewImageNode) {
          addPreviewImageNode.src = imageUrl;
          addPreviewImageNode.alt = addPreviewTitleNode.textContent;
          addPreviewImageNode.classList.toggle('is-visible', Boolean(imageUrl));
        }

        if (addPreviewPlaceholderNode) {
          addPreviewPlaceholderNode.hidden = Boolean(imageUrl);
        }

        addPreviewNode.hidden = false;
        addPreviewNode.classList.add('is-visible');
      }

      function renderLatestVehiclePreview() {
        if (!addPreviewNode || !addPreviewTitleNode || !addPreviewCopyNode) {
          return;
        }

        let previewData = null;
        let latestTouristSubmission = null;
        const currentPreviewToken = previewRenderToken + 1;
        previewRenderToken = currentPreviewToken;

        try {
          previewData = JSON.parse(
            sessionStorage.getItem(latestVehicleKey) ||
            localStorage.getItem(latestVehicleKey) ||
            'null'
          );
        } catch (error) {
          previewData = null;
        }

        try {
          latestTouristSubmission = JSON.parse(
            sessionStorage.getItem(latestTouristSubmissionKey) ||
            localStorage.getItem(latestTouristSubmissionKey) ||
            'null'
          );
        } catch (error) {
          latestTouristSubmission = null;
        }

        if (!previewData) {
          addPreviewNode.hidden = true;
          addPreviewNode.classList.remove('is-visible');
          if (addPreviewEyebrowNode) {
            addPreviewEyebrowNode.textContent = 'Tourist Bus';
          }
          if (addPreviewTitleNode) {
            addPreviewTitleNode.textContent = 'New vehicle added';
          }
          addPreviewCopyNode.textContent = 'Your latest vehicle details will appear here.';
          if (addPreviewStatusNode) {
            addPreviewStatusNode.textContent = 'Status : Pending';
            addPreviewStatusNode.classList.remove('is-active', 'is-rejected');
          }
          renderPreviewMeta([]);
          applyPreviewImage('', '');
          return;
        }

        const modelVariant = String(
          previewData.modelVariant ||
          (latestTouristSubmission && latestTouristSubmission.bus && latestTouristSubmission.bus.modelVariant) ||
          (latestTouristSubmission && latestTouristSubmission.summary && latestTouristSubmission.summary.bus && latestTouristSubmission.summary.bus.modelVariant) ||
          ''
        ).trim();
        const vehicleLabel = String(previewData.vehicleLabel || 'Tourist Bus').trim() || 'Tourist Bus';
        const busType = valueToText(previewData.type);
        const subtitleParts = [
          busType ? 'Bus Type: ' + busType : '',
          previewData.place ? valueToText(previewData.place) : ''
        ].filter(Boolean);
        const metaValues = [
          previewData.seats ? valueToText(previewData.seats) + ' seats' : '',
          previewData.permitType ? valueToText(previewData.permitType) : '',
          previewData.photoCount ? valueToText(previewData.photoCount) + ' photos' : ''
        ].filter(Boolean);

        const photosFromPreview = Number(previewData.photoCount) || 0;
        const photosFromSubmission = Number(
          (latestTouristSubmission && latestTouristSubmission.bus && latestTouristSubmission.bus.photos && latestTouristSubmission.bus.photos.length) ||
          (latestTouristSubmission && latestTouristSubmission.summary && latestTouristSubmission.summary.bus && latestTouristSubmission.summary.bus.photos && latestTouristSubmission.summary.bus.photos.length) ||
          0
        );
        const hasAnyPhotos = (photosFromPreview || photosFromSubmission) > 0;

        // If the user paused while adding a vehicle and hasn't uploaded any photos yet,
        // don't show the "latest vehicle" preview card.
        if (!hasAnyPhotos) {
          addPreviewNode.hidden = true;
          addPreviewNode.classList.remove('is-visible');
          renderPreviewMeta([]);
          applyPreviewImage('', '');
          return;
        }

        if (addPreviewEyebrowNode) {
          addPreviewEyebrowNode.textContent = vehicleLabel;
        }

        addPreviewTitleNode.textContent = modelVariant || 'Latest vehicle';
        addPreviewCopyNode.textContent = subtitleParts.join(' | ') || 'Saved from the latest submit.';
        const storedStatus = normalizeVehicleStatus(
          sessionStorage.getItem(latestVehicleStatusKey) ||
          localStorage.getItem(latestVehicleStatusKey)
        );
        const statusFromPreview = normalizeVehicleStatus(previewData.statusLabel);
        const statusFromSubmission = normalizeVehicleStatus(
          latestTouristSubmission && latestTouristSubmission.status
        );
        const nextStatus = storedStatus !== 'pending'
          ? storedStatus
          : statusFromSubmission !== 'pending'
            ? statusFromSubmission
            : statusFromPreview;
        const statusPresentation = getVehicleStatusPresentation(nextStatus);

        if (addPreviewStatusNode) {
          addPreviewStatusNode.textContent = 'Status : ' + statusPresentation.label;
          addPreviewStatusNode.classList.remove('is-active', 'is-rejected');
          if (statusPresentation.className) {
            addPreviewStatusNode.classList.add(statusPresentation.className);
          }
        }
        setLatestVehicleStatus(nextStatus);
        renderPreviewMeta(metaValues);
        applyPreviewImage('', '');

        addPreviewNode.hidden = false;
        addPreviewNode.classList.add('is-visible');

        resolveStoredPreviewImage(previewData, latestTouristSubmission).then(function (imageUrl) {
          if (currentPreviewToken !== previewRenderToken) {
            return;
          }

          applyPreviewImage(imageUrl, addPreviewTitleNode.textContent);
        });
      }

      function openLatestVehicleSubmission() {
        let latestTouristSubmission = null;

        try {
          latestTouristSubmission = JSON.parse(
            sessionStorage.getItem(latestTouristSubmissionKey) ||
            localStorage.getItem(latestTouristSubmissionKey) ||
            'null'
          );
        } catch (error) {
          latestTouristSubmission = null;
        }

        const storedStatus = normalizeVehicleStatus(
          sessionStorage.getItem(latestVehicleStatusKey) ||
          localStorage.getItem(latestVehicleStatusKey) ||
          (latestTouristSubmission && latestTouristSubmission.status) ||
          ''
        );

        // For drafts, continue the upload page instead of opening the review dashboard.
        if (storedStatus === 'incomplete') {
          window.location.href = 'owner-add-vehicle-next.html?resume=1';
          return;
        }

        const latestSubmissionId = String(
          sessionStorage.getItem('owner-latest-submission-id') ||
          localStorage.getItem('owner-latest-submission-id') ||
          (latestTouristSubmission && latestTouristSubmission.id) ||
          ''
        ).trim();

        if (!latestSubmissionId) {
          return;
        }

        sessionStorage.setItem('owner-latest-submission-id', latestSubmissionId);
        localStorage.setItem('owner-latest-submission-id', latestSubmissionId);
        window.location.href = 'vect-own/dashboard.html?page=tourist-bus&vehicle=tourist&submissionId=' + encodeURIComponent(latestSubmissionId);
      }

      function syncLatestVehicleStatusFromServer() {
        const latestSubmissionId = String(
          sessionStorage.getItem('owner-latest-submission-id') ||
          localStorage.getItem('owner-latest-submission-id') ||
          ''
        ).trim();

        if (!latestSubmissionId) {
          return Promise.resolve();
        }

        return fetch(apiBaseUrl + '/api/submissions/' + encodeURIComponent(latestSubmissionId))
          .then(function (response) {
            if (!response.ok) {
              return null;
            }

            return response.json();
          })
          .then(function (payload) {
            const submission = payload && payload.submission ? payload.submission : null;
            const nextStatus = normalizeVehicleStatus(submission && submission.status);

            if (!submission || nextStatus === 'pending') {
              return;
            }

            try {
              const latestSubmission = JSON.parse(
                sessionStorage.getItem(latestTouristSubmissionKey) ||
                localStorage.getItem(latestTouristSubmissionKey) ||
                'null'
              );

              if (latestSubmission && typeof latestSubmission === 'object') {
                latestSubmission.status = submission.status;
                sessionStorage.setItem(latestTouristSubmissionKey, JSON.stringify(latestSubmission));
                localStorage.setItem(latestTouristSubmissionKey, JSON.stringify(latestSubmission));
              }
            } catch (error) {
              return;
            }

            setLatestVehicleStatus(nextStatus);
            renderLatestVehiclePreview();
          })
          .catch(function () {
            return;
          });
      }

      if (!reuploadSubmissionId) {
        sessionStorage.removeItem('owner-reupload-submission-id');
        sessionStorage.removeItem(reuploadEditableSectionsKey);
      } else {
        sessionStorage.setItem('owner-reupload-submission-id', reuploadSubmissionId);
        if (editableSectionsFromQuery) {
          sessionStorage.setItem(reuploadEditableSectionsKey, JSON.stringify(parseEditableSections(editableSectionsFromQuery)));
        }
      }

      const companyName = String(localStorage.getItem('owner-company-name') || sessionStorage.getItem('owner-company-name') || 'VECT MOVERS').trim();
      const profileName = String(sessionStorage.getItem('owner-name') || localStorage.getItem('owner-name') || localStorage.getItem('owner-first-name') || 'Owner profile').trim();

      if (companyNode) {
        companyNode.textContent = companyName;
      }

      if (profileNode) {
        profileNode.textContent = profileName;
      }

      setAvatar(companyName || profileName);

      if (window.ownerMediaStore && typeof window.ownerMediaStore.getItem === 'function') {
        window.ownerMediaStore.getItem('owner-profile-photo').then(function (profilePhoto) {
          if (!profilePhoto || !avatarNode) {
            return;
          }

          avatarNode.textContent = '';
          avatarNode.style.backgroundImage = 'url("' + profilePhoto.replace(/"/g, '%22') + '")';
          avatarNode.style.backgroundSize = 'cover';
          avatarNode.style.backgroundPosition = 'center';
        }).catch(function () {
          return;
        });
      }

      if (closeButton && panel && backdrop) {
        closeButton.addEventListener('click', function () {
          panel.classList.remove('is-open');
          panel.setAttribute('aria-hidden', 'true');
          backdrop.classList.remove('is-visible');
          backdrop.setAttribute('aria-hidden', 'true');
          document.body.style.overflow = '';
          var header = document.querySelector('.header');
          if (header) {
            header.classList.remove('panel-open');
          }
        });
      }

      if (backdrop) {
        backdrop.addEventListener('click', function () {
          if (closeButton) {
            closeButton.click();
          }
        });
      }

      document.addEventListener('click', function (event) {
        const dayButton = event.target.closest('.route-calendar-day[data-date-key]');

        if (!dayButton) {
          const ownerTab = event.target.closest('[data-owner-tab]');

          if (ownerTab) {
            setActiveOwnerPage(ownerTab.getAttribute('data-owner-tab'));
          }
          return;
        }

        const dateKey = dayButton.getAttribute('data-date-key');

        if (!previewNode || !previewDateNode) {
          return;
        }

        previewDateNode.textContent = formatDateKey(dateKey);
        previewNode.classList.add('is-visible');
        previewNode.setAttribute('aria-hidden', 'false');

        window.setTimeout(function () {
          previewNode.classList.add('is-visible');
        }, 0);
      });

      if (addVehicleTrigger) {
        addVehicleTrigger.addEventListener('click', function () {
          const nextUrl = new URL('owner-add-vehicle.html', window.location.href);
          const editableSections = getEditableSectionsParam();

          if (reuploadSubmissionId) {
            nextUrl.searchParams.set('submissionId', reuploadSubmissionId);
            sessionStorage.setItem('owner-reupload-submission-id', reuploadSubmissionId);
            if (editableSections.length) {
              nextUrl.searchParams.set('editable', editableSections.join(','));
              sessionStorage.setItem(reuploadEditableSectionsKey, JSON.stringify(editableSections));
            }
          }

          window.location.href = nextUrl.toString();
        });
      }

      if (addPreviewNode) {
        addPreviewNode.addEventListener('click', function () {
          openLatestVehicleSubmission();
        });
      }

      renderLatestVehiclePreview();
      syncLatestVehicleStatusFromServer();

      setActiveOwnerPage(pageParams.get('tab') || pageParams.get('page') || 'booking');
    })();
  </script>
</body>
</html>
