<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Done</title>
  <meta name="api-base-url" content="https://go-kerala-backend.onrender.com">
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260413-1">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-details-done-main">
    <section class="owner-details-done-card" aria-label="Submission complete">
      <div class="owner-details-done-check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5l4.2 4.2L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <h1 class="owner-details-done-title">Done!</h1>
      <p class="owner-details-done-text">We will send an update within 2-3 days.</p>
    </section>
  </main>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const apiBaseMetaTag = document.querySelector('meta[name="api-base-url"]');
      const apiBaseFromMeta = apiBaseMetaTag ? String(apiBaseMetaTag.getAttribute('content') || '').trim() : '';
      const apiBaseFromSession = String(sessionStorage.getItem('owner-api-base-url') || '').trim();
      const apiBaseUrl = (apiBaseFromMeta || apiBaseFromSession).replace(/\/$/, '');
      const isReviewDone = sessionStorage.getItem('owner-review-done-allowed') === 'yes';
      const submissionId = String(sessionStorage.getItem('owner-review-submission-id') || '').trim();
      const blockedKeys = [
        /password/i,
        /authenticated/i,
        /api-base-url/i,
        /account-created/i,
        /login-/i
      ];
      const mediaFieldKeys = [
        'owner-profile-photo',
        'owner-heavy-licence-photo-url-1',
        'owner-heavy-licence-photo-url-2',
        'owner-aadhaar-photo-url',
        'owner-pan-photo-url',
        'owner-gst-photo-url',
        'owner-company-logo-url'
      ];

      function getApiUrl(pathName) {
        return apiBaseUrl ? apiBaseUrl + pathName : pathName;
      }

      function shouldKeepKey(key) {
        if (!/^owner-/i.test(key)) {
          return false;
        }

        return !blockedKeys.some(function (pattern) {
          return pattern.test(key);
        });
      }

      function collectStorage(source) {
        const data = {};

        for (let index = 0; index < source.length; index += 1) {
          const key = source.key(index);

          if (!key || !shouldKeepKey(key)) {
            continue;
          }

          data[key] = source.getItem(key);
        }

        return data;
      }

      async function collectPayloadFields() {
        return Object.assign({}, collectStorage(sessionStorage), collectStorage(localStorage));
      }

      async function syncReviewedSubmission() {
        if (!isReviewDone || !submissionId) {
          return;
        }

        const fields = await collectPayloadFields();
        const response = await fetch(getApiUrl('/api/submissions/' + encodeURIComponent(submissionId) + '/owner-update'), {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            fields: fields,
            whatsappNumber: fields['owner-whatsapp-number'] || ''
          })
        });

        if (!response.ok) {
          let errorMessage = 'Unable to sync your updated details.';

          try {
            const payload = await response.json();
            if (payload && payload.error) {
              errorMessage = String(payload.error);
            }
          } catch (error) {
            // Keep default message.
          }

          throw new Error(errorMessage);
        }

        sessionStorage.removeItem('owner-review-done-allowed');
        sessionStorage.removeItem('owner-review-submission-id');
      }

      syncReviewedSubmission().catch(function (error) {
        if (window.console && typeof window.console.error === 'function') {
          window.console.error(error);
        }
      });
    })();
  </script>
</body>
</html>
