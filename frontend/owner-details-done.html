<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Done</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260413-1">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-details-done-main">
    <section class="owner-details-done-card" aria-label="Submission complete">
      <div class="owner-details-done-check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12.5l4.2 4.2L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </div>
      <h1 class="owner-details-done-title">Done!</h1>
      <p class="owner-details-done-text">We will send an update within 2-3 days.</p>
    </section>
  </main>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const reviewDoneAllowed = sessionStorage.getItem('owner-review-done-allowed') === 'yes';
      const finalSubmissionDoneAllowed = sessionStorage.getItem('owner-final-submission-done-allowed') === 'yes';

      if (!reviewDoneAllowed && !finalSubmissionDoneAllowed) {
        window.location.replace('owner-next.html');
        return;
      }

      sessionStorage.removeItem('owner-review-done-allowed');
      sessionStorage.removeItem('owner-final-submission-done-allowed');
    })();
  </script>
</body>
</html>
