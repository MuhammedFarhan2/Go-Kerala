<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uploaded Photo</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260409-2">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-blank-main">
    <section class="owner-blank-sheet" aria-label="Uploaded photo page">
      <div class="owner-blank-content owner-uploaded-content">
        <h2 class="owner-uploaded-title">Add the backside of the licence</h2>
        <p class="owner-uploaded-note">Make sure all information is readable and not blurry, and that all corners of the document are visible.</p>

        <p class="owner-aadhaar-status" data-owner-uploaded-status hidden></p>

        <div class="owner-uploaded-list" data-owner-uploaded-list hidden>
          <div class="owner-uploaded-list-row">
            <p class="owner-uploaded-list-label" data-owner-uploaded-photo-one></p>
            <button type="button" class="owner-uploaded-delete owner-uploaded-delete-text" data-owner-uploaded-delete-one>Delete</button>
          </div>
          <div class="owner-uploaded-list-row" data-owner-uploaded-photo-two-row hidden>
            <p class="owner-uploaded-list-label" data-owner-uploaded-photo-two></p>
            <button type="button" class="owner-uploaded-delete owner-uploaded-delete-text" data-owner-uploaded-delete-two hidden>Delete</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="owner-heavy-bottom-bar owner-uploaded-bottom-bar">
    <input
      type="file"
      accept=".jpg,.jpeg,.png,image/jpeg,image/png"
      capture="user"
      hidden
      data-owner-uploaded-take-photo-input
    >
    <input
      type="file"
      accept=".jpg,.jpeg,.png,image/jpeg,image/png"
      hidden
      data-owner-uploaded-upload-photo-input
    >

    <div class="owner-heavy-upload-menu" hidden data-owner-uploaded-upload-menu>
      <button type="button" class="owner-heavy-upload-option" data-owner-uploaded-action="take-photo">Take Photo with Camera</button>
      <button type="button" class="owner-heavy-upload-option" data-owner-uploaded-action="upload-photo">Upload Photo</button>
    </div>

    <button type="button" class="owner-next-btn owner-uploaded-next-btn" data-owner-uploaded-next>Add Photo</button>
  </div>

  <script src="script.js?v=20260409-2"></script>
  <script>
    (function () {
      const statusNode = document.querySelector('[data-owner-uploaded-status]');
      const imageList = document.querySelector('[data-owner-uploaded-list]');
      const photoOneNode = document.querySelector('[data-owner-uploaded-photo-one]');
      const photoTwoNode = document.querySelector('[data-owner-uploaded-photo-two]');
      const photoTwoRow = document.querySelector('[data-owner-uploaded-photo-two-row]');
      const deleteOneButton = document.querySelector('[data-owner-uploaded-delete-one]');
      const deleteTwoButton = document.querySelector('[data-owner-uploaded-delete-two]');
      const nextButton = document.querySelector('[data-owner-uploaded-next]');
      const uploadMenu = document.querySelector('[data-owner-uploaded-upload-menu]');
      const takePhotoInput = document.querySelector('[data-owner-uploaded-take-photo-input]');
      const uploadPhotoInput = document.querySelector('[data-owner-uploaded-upload-photo-input]');
      const actionButtons = Array.from(document.querySelectorAll('[data-owner-uploaded-action]'));
      const STORAGE_COUNT_KEY = 'owner-heavy-licence-photo-count';
      const STORAGE_NAME_ONE_KEY = 'owner-heavy-licence-photo-name-1';
      const STORAGE_NAME_TWO_KEY = 'owner-heavy-licence-photo-name-2';
      const STORAGE_URL_ONE_KEY = 'owner-heavy-licence-photo-url-1';
      const STORAGE_URL_TWO_KEY = 'owner-heavy-licence-photo-url-2';
      const SUBMITTED_KEY = 'owner-heavy-licence-submitted-v2';
      const STATUS_KEY = 'owner-heavy-licence-status-v2';
      let selectedCount = Math.max(1, Math.min(2, Number(sessionStorage.getItem(STORAGE_COUNT_KEY) || '1')));

      if (!statusNode || !nextButton || !uploadMenu || !takePhotoInput || !uploadPhotoInput) {
        return;
      }

      function validateFile(file) {
        const allowedTypes = ['image/jpeg', 'image/png'];
        const maxSizeInBytes = 2 * 1024 * 1024;

        if (!file) {
          return 'Please choose an image.';
        }

        if (!allowedTypes.includes(file.type)) {
          return 'Please upload only JPG, JPEG, or PNG image files.';
        }

        if (file.size > maxSizeInBytes) {
          return 'Image size must be 2MB or less.';
        }

        return '';
      }

      function readFileAsDataUrl(file) {
        return new Promise(function (resolve, reject) {
          const reader = new FileReader();

          reader.onload = function () {
            resolve(String(reader.result || ''));
          };

          reader.onerror = function () {
            reject(new Error('Unable to read image file.'));
          };

          reader.readAsDataURL(file);
        });
      }

      function renderSelectedCount() {
        const firstPhotoName = sessionStorage.getItem(STORAGE_NAME_ONE_KEY) || 'Photo 1 selected';
        const secondPhotoName = sessionStorage.getItem(STORAGE_NAME_TWO_KEY) || 'Photo 2 selected';

        statusNode.hidden = false;
        statusNode.textContent = 'Selected photos: ' + selectedCount;
        nextButton.textContent = selectedCount >= 2 ? 'Next' : 'Add Photo';

        if (!imageList || !photoOneNode || !photoTwoNode || !photoTwoRow || !deleteOneButton || !deleteTwoButton) {
          return;
        }

        imageList.hidden = false;
        photoOneNode.textContent = 'Image 1: ' + firstPhotoName;
        deleteOneButton.hidden = false;
        if (selectedCount < 2) {
          photoTwoRow.remove();
          return;
        }

        if (!photoTwoRow.isConnected) {
          imageList.appendChild(photoTwoRow);
        }

        photoTwoRow.hidden = false;
        photoTwoNode.textContent = 'Image 2: ' + secondPhotoName;
        deleteTwoButton.hidden = false;
      }

      function resetToFirstPage() {
        sessionStorage.removeItem(STORAGE_COUNT_KEY);
        sessionStorage.removeItem(STORAGE_NAME_ONE_KEY);
        sessionStorage.removeItem(STORAGE_NAME_TWO_KEY);
        sessionStorage.removeItem(STORAGE_URL_ONE_KEY);
        sessionStorage.removeItem(STORAGE_URL_TWO_KEY);
        sessionStorage.removeItem('owner-heavy-licence-status');
        sessionStorage.removeItem('owner-heavy-licence-submitted');
        sessionStorage.removeItem(STATUS_KEY);
        sessionStorage.removeItem(SUBMITTED_KEY);
        window.location.href = 'owner-heavy-driving-licence.html';
      }

      function deleteSecondPhoto() {
        selectedCount = 1;
        sessionStorage.setItem(STORAGE_COUNT_KEY, '1');
        sessionStorage.removeItem(STORAGE_NAME_TWO_KEY);
        sessionStorage.removeItem(STORAGE_URL_TWO_KEY);
        sessionStorage.removeItem('owner-heavy-licence-status');
        sessionStorage.removeItem('owner-heavy-licence-submitted');
        sessionStorage.removeItem(STATUS_KEY);
        sessionStorage.removeItem(SUBMITTED_KEY);
        renderSelectedCount();
      }

      async function saveSecondPhoto(file) {
        const validationMessage = validateFile(file);

        if (validationMessage) {
          window.alert(validationMessage);
          return;
        }

        nextButton.disabled = true;
        nextButton.textContent = 'Uploading...';

        try {
          const imageDataUrl = await readFileAsDataUrl(file);
          selectedCount = 2;
          sessionStorage.setItem(STORAGE_COUNT_KEY, '2');
          sessionStorage.setItem(STORAGE_NAME_TWO_KEY, file.name);
          sessionStorage.setItem(STORAGE_URL_TWO_KEY, imageDataUrl);
          renderSelectedCount();
        } catch (error) {
          nextButton.textContent = 'Add Photo';
          window.alert(error.message || 'Unable to upload image.');
        } finally {
          nextButton.disabled = false;
        }
      }

      function closeMenu() {
        uploadMenu.classList.remove('is-open');
        window.setTimeout(function () {
          if (!uploadMenu.classList.contains('is-open')) {
            uploadMenu.hidden = true;
          }
        }, 220);
      }

      nextButton.addEventListener('click', function () {
        if (selectedCount >= 2) {
          sessionStorage.setItem(STATUS_KEY, 'completed');
          sessionStorage.setItem(SUBMITTED_KEY, 'yes');
          window.location.href = 'owner-next.html';
          return;
        }

        const isOpen = uploadMenu.classList.contains('is-open');

        if (isOpen) {
          closeMenu();
          return;
        }

        uploadMenu.hidden = false;
        window.requestAnimationFrame(function () {
          uploadMenu.classList.add('is-open');
        });
      });

      actionButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          const action = button.getAttribute('data-owner-uploaded-action');
          closeMenu();

          if (action === 'take-photo') {
            takePhotoInput.click();
            return;
          }

          if (action === 'upload-photo') {
            uploadPhotoInput.click();
          }
        });
      });

      takePhotoInput.addEventListener('change', function () {
        const file = takePhotoInput.files[0];

        if (!file) {
          return;
        }

        saveSecondPhoto(file);
        takePhotoInput.value = '';
      });

      uploadPhotoInput.addEventListener('change', function () {
        const file = uploadPhotoInput.files[0];

        if (!file) {
          return;
        }

        saveSecondPhoto(file);
        uploadPhotoInput.value = '';
      });

      document.addEventListener('click', function (event) {
        if (!uploadMenu.classList.contains('is-open')) {
          return;
        }

        if (uploadMenu.contains(event.target) || nextButton.contains(event.target)) {
          return;
        }

        closeMenu();
      });

      if (deleteOneButton) {
        deleteOneButton.addEventListener('click', function () {
          resetToFirstPage();
        });
      }

      if (deleteTwoButton) {
        deleteTwoButton.addEventListener('click', function () {
          deleteSecondPhoto();
        });
      }

      renderSelectedCount();
    })();
  </script>
</body>
</html>
