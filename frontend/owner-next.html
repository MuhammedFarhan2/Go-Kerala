<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Next Step</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <link rel="stylesheet" href="style.css?v=20260409-3">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-blank-main">
    <section class="owner-blank-sheet" aria-label="Owner blank sheet">
      <div class="owner-blank-content owner-next-page-content">
        <h1 class="owner-blank-title">
          Welcome , <span data-owner-next-company>- -</span>
        </h1>
        <p class="owner-blank-subtitle">Please complete these steps to Start</p>

        <div class="owner-next-steps" aria-label="Owner setup steps">
          <button type="button" class="owner-next-step" data-owner-next-link="owner-heavy-driving-licence.html" data-owner-step-id="heavy-licence">
            <span class="owner-next-step-copy">
              <span class="owner-next-step-title">Heavy Driving Licence</span>
            </span>
            <span class="owner-next-step-arrow" aria-hidden="true">&#8250;</span>
          </button>

          <button type="button" class="owner-next-step" data-owner-next-link="owner-profile-photo.html" data-owner-step-id="profile-photo">
            <span class="owner-next-step-copy">
              <span class="owner-next-step-title">Profile photo</span>
            </span>
            <span class="owner-next-step-arrow" aria-hidden="true">&#8250;</span>
          </button>

          <button type="button" class="owner-next-step" data-owner-next-link="owner-aadhaar-card.html" data-owner-step-id="aadhaar">
            <span class="owner-next-step-copy">
              <span class="owner-next-step-title">Aadhaar Card</span>
            </span>
            <span class="owner-next-step-arrow" aria-hidden="true">&#8250;</span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260409-3"></script>
  <script>
    (function () {
      const companyNode = document.querySelector('[data-owner-next-company]');
      const stepsContainer = document.querySelector('.owner-next-steps');
      const nextStepButtons = Array.from(document.querySelectorAll('[data-owner-next-link]'));
      const heavyLicenceButton = document.querySelector('[data-owner-step-id="heavy-licence"]');
      const profilePhotoButton = document.querySelector('[data-owner-step-id="profile-photo"]');
      const aadhaarButton = document.querySelector('[data-owner-step-id="aadhaar"]');

      if (!companyNode) {
        return;
      }

      companyNode.textContent = sessionStorage.getItem('owner-company-name') || 'This company';

      const hasHeavyLicenceSubmission =
        sessionStorage.getItem('owner-heavy-licence-submitted-v2') === 'yes' &&
        sessionStorage.getItem('owner-heavy-licence-photo-count') === '2';

      const hasAadhaarSubmission =
        sessionStorage.getItem('owner-aadhaar-submitted-v2') === 'yes' &&
        Boolean(sessionStorage.getItem('owner-aadhaar-photo-name'));

      const hasProfilePhotoSubmission =
        sessionStorage.getItem('owner-profile-photo-submitted-v2') === 'yes';

      if (!hasHeavyLicenceSubmission) {
        sessionStorage.removeItem('owner-heavy-licence-status');
        sessionStorage.removeItem('owner-heavy-licence-submitted');
        sessionStorage.removeItem('owner-heavy-licence-status-v2');
        sessionStorage.removeItem('owner-heavy-licence-submitted-v2');
      }

      if (!hasHeavyLicenceSubmission && sessionStorage.getItem('owner-heavy-licence-status-v2') === 'completed') {
        sessionStorage.removeItem('owner-heavy-licence-status-v2');
      }

      if (!hasAadhaarSubmission) {
        sessionStorage.removeItem('owner-aadhaar-status');
        sessionStorage.removeItem('owner-aadhaar-submitted');
        sessionStorage.removeItem('owner-aadhaar-status-v2');
        sessionStorage.removeItem('owner-aadhaar-submitted-v2');
      }

      if (!hasAadhaarSubmission && sessionStorage.getItem('owner-aadhaar-status-v2') === 'completed') {
        sessionStorage.removeItem('owner-aadhaar-status-v2');
      }

      if (!hasProfilePhotoSubmission) {
        sessionStorage.removeItem('owner-profile-photo-status-v2');
        sessionStorage.removeItem('owner-profile-photo-submitted-v2');
      }

      if (!hasProfilePhotoSubmission && sessionStorage.getItem('owner-profile-photo-status-v2') === 'completed') {
        sessionStorage.removeItem('owner-profile-photo-status-v2');
      }

      function applyCompletedStep(stepButton, storageKey) {
        if (!stepsContainer || !stepButton || sessionStorage.getItem(storageKey) !== 'completed') {
          return;
        }

        stepButton.classList.add('is-completed');
        stepButton.removeAttribute('data-owner-next-link');
        stepButton.setAttribute('aria-disabled', 'true');

        const copyNode = stepButton.querySelector('.owner-next-step-copy');
        let statusNode = stepButton.querySelector('[data-owner-step-status]');

        if (copyNode && !statusNode) {
          statusNode = document.createElement('span');
          statusNode.className = 'owner-next-step-note';
          statusNode.setAttribute('data-owner-step-status', '');
          statusNode.textContent = 'Under valuation';
          copyNode.appendChild(statusNode);
        }

        stepsContainer.appendChild(stepButton);
      }

      applyCompletedStep(heavyLicenceButton, 'owner-heavy-licence-status-v2');
      applyCompletedStep(profilePhotoButton, 'owner-profile-photo-status-v2');
      applyCompletedStep(aadhaarButton, 'owner-aadhaar-status-v2');

      const allStepsCompleted =
        sessionStorage.getItem('owner-heavy-licence-status-v2') === 'completed' &&
        sessionStorage.getItem('owner-profile-photo-status-v2') === 'completed' &&
        sessionStorage.getItem('owner-aadhaar-status-v2') === 'completed';

      if (allStepsCompleted) {
        window.location.replace('owner-details-wait.html');
        return;
      }

      nextStepButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          if (button.classList.contains('is-completed')) {
            return;
          }

          const destination = button.getAttribute('data-owner-next-link');

          if (destination) {
            window.location.href = destination;
          }
        });
      });
    })();
  </script>
</body>
</html>
