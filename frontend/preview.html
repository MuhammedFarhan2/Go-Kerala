<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manual Location Picker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    #map{
      height:100vh;
      width:100%;
    }

    .search-container{
      position:absolute;
      top:15px;
      left:50%;
      transform:translateX(-50%);
      width:min(420px, calc(100vw - 28px));
      z-index:1000;
    }

    .search-box{
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border-radius:30px;
      padding:10px 15px;
      box-shadow:0 0 15px rgba(0,0,0,.2);
    }

    .search-box input{
      flex:1;
      border:none;
      outline:none;
      font-size:16px;
      min-width:0;
      background:transparent;
    }

    .clear-btn{
      border:none;
      background:transparent;
      cursor:pointer;
      font-size:20px;
      line-height:1;
      padding:0;
    }

    .suggestions{
      display:none;
      max-height:240px;
      overflow-y:auto;
      background:#fff;
      border-radius:15px;
      margin-top:6px;
      box-shadow:0 0 15px rgba(0,0,0,.2);
      border:1px solid rgba(0,0,0,.08);
      animation: suggestionPop .16s ease-out;
    }

    .item{
      padding:12px 14px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      font-size:14px;
      line-height:1.35;
      transition: background .15s ease, transform .15s ease, color .15s ease;
    }

    .item:hover{
      background:#f3f3f3;
      transform: translateX(2px);
    }

    .item:active{
      background:#e9e9e9;
      transform: translateX(1px) scale(.995);
    }

    .item.is-placeholder{
      cursor:default;
      color:#666;
      background:#fafafa;
    }

    .info-box{
      position:absolute;
      top:10px;
      left:10px;
      z-index:999;
      background:white;
      padding:15px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
      width:320px;
    }

    .info-box h2{
      margin:0 0 10px;
      font-size:18px;
    }

    .info-box p{
      margin:6px 0;
      font-size:14px;
    }

    .location-title{
      display:flex;
      align-items:center;
      gap:8px;
      margin:0 0 10px;
      font-size:20px;
      font-weight:700;
    }

    .location-title-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      width:18px;
      height:18px;
      color:#e94b7a;
    }

    .location-title-icon svg{
      display:block;
      width:100%;
      height:100%;
    }

    .location-title-icon svg path,
    .location-title-icon svg circle{
      stroke:#ec407a;
      fill:#ec407a;
    }

    .location-action,
    #useLocation{
      margin-top:10px;
      width:100%;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      font-weight:600;
      background:#111;
      color:#fff;
      opacity:.55;
      cursor:not-allowed;
    }

    .location-action:not(:disabled),
    #useLocation:not(:disabled){
      opacity:1;
      cursor:pointer;
    }

    @keyframes suggestionPop{
      from{
        opacity:0;
        transform: translateY(-4px) scale(.985);
      }
      to{
        opacity:1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 680px){
      body{
        overflow:hidden;
      }

      .leaflet-top.leaflet-left{
        top:auto;
        bottom:168px;
        left:14px;
      }

      .leaflet-control-zoom{
        margin:0;
      }

      #map{
        height:100vh;
      }

      .search-container{
        top:12px;
      }

      .info-box{
        position:fixed;
        left:14px;
        right:14px;
        bottom:92px;
        top:auto;
        width:auto;
        margin:0;
        max-height:42vh;
        overflow:auto;
        z-index:999;
        padding:14px 14px 12px;
        border-radius:18px;
      }

      .info-box h2{
        font-size:16px;
        margin-bottom:8px;
      }

      .info-box p{
        margin:3px 0;
        font-size:12.5px;
        line-height:1.25;
      }

      .info-box p b{
        font-weight:700;
      }

      #lat,
      #lon{
        display:none;
      }

      .location-title-icon{
        width:14px;
        height:14px;
      }

      .location-action,
      #useLocation{
        position:fixed;
        left:14px;
        right:14px;
        bottom:14px;
        width:auto;
        margin-top:0;
        padding:12px 14px;
        border-radius:12px;
        z-index:1000;
      }

      #address{
        margin-top:4px;
        font-size:12.8px;
        line-height:1.35;
      }

      .address-label{
        display:none;
      }

      .suggestions{
        margin-top:8px;
        border-radius:18px;
      }

      .item{
        padding:13px 15px;
        font-size:15px;
      }

      body.has-selection #map{
        display:block;
      }

      body:not(.has-selection) .location-title-icon,
      body:not(.has-selection) .info-box p{
        display:none;
      }

      body:not(.has-selection) .info-box{
        display:none;
      }

      body:not(.has-selection) #useLocation{
        display:none;
      }

      body.has-selection .address-label{
        display:none;
      }

      body.has-selection .info-box{
        bottom:70px;
        max-height:30vh;
      }

      body.has-selection #useLocation{
        left:50%;
        right:auto;
        bottom:14px;
        width:min(340px, calc(100vw - 40px)) !important;
        padding:12px 14px !important;
        font-size:14px !important;
        transform:translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <div class="info-box">
    <h2 class="location-title">
      <span class="location-title-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 21s6-5.3 6-10.2A6 6 0 1 0 6 10.8C6 15.7 12 21 12 21Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <circle cx="12" cy="10.8" r="2.1" fill="currentColor"/>
        </svg>
      </span>
      <span>Selected Location</span>
    </h2>

    <p><b>Latitude:</b> <span id="lat">Click on map</span></p>
    <p><b>Longitude:</b> <span id="lon">Click on map</span></p>
    <p><b>Village:</b> <span id="village">-</span></p>
    <p><b>Town:</b> <span id="town">-</span></p>
    <p><b>City/Region:</b> <span id="city">-</span></p>
    <p class="address-label"><b>Full Address:</b></p>
    <p id="address">Click anywhere on map</p>

    <button id="useLocation" type="button" disabled>
      Use this location
    </button>
  </div>

  <div class="search-container">
    <div class="search-box">
      <input id="searchInput" placeholder="Search places anywhere...">
      <button type="button" class="clear-btn" id="clearSearchBtn" aria-label="Clear search">✖</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const pageParams = new URLSearchParams(window.location.search);
    const targetField = pageParams.get('field') === 'to' ? 'to' : 'from';
    const useBtn = document.getElementById('useLocation');
    const input = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const suggestions = document.getElementById('suggestions');
    const body = document.body;

    let selectedFullAddress = '';
    let page = 0;
    let currentQuery = '';
    let cache = {};
    let loading = false;
    let marker;

    const map = L.map('map').setView([10.8505, 76.2711], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    function updateUseButtonState() {
      if (!useBtn) return;
      useBtn.disabled = !selectedFullAddress || selectedFullAddress === 'Not Available';
      useBtn.style.opacity = useBtn.disabled ? '.55' : '1';
      useBtn.style.cursor = useBtn.disabled ? 'not-allowed' : 'pointer';
    }

    function clearSuggestions() {
      suggestions.innerHTML = '';
      suggestions.style.display = 'none';
    }

    async function renderPlace(place) {
      const lat = Number(place.lat);
      const lon = Number(place.lon);

      if (marker) {
        marker.remove();
      }

      marker = L.marker([lat, lon]).addTo(map).bindPopup(place.display_name).openPopup();
      map.setView([lat, lon], 15);

      input.value = place.display_name;
      clearSuggestions();

      document.getElementById("lat").innerText = lat.toFixed(6);
      document.getElementById("lon").innerText = lon.toFixed(6);

      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );
        const data = await response.json();
        const addr = data.address || {};

        const village =
          addr.village ||
          addr.hamlet ||
          addr.suburb ||
          addr.neighbourhood ||
          "Not Available";

        const town =
          addr.town ||
          addr.municipality ||
          "Not Available";

        const city =
          addr.city ||
          addr.county ||
          addr.state_district ||
          "Not Available";

        const fullAddress = data.display_name || place.display_name || "Not Available";

        document.getElementById("village").innerText = village;
        document.getElementById("town").innerText = town;
        document.getElementById("city").innerText = city;
        document.getElementById("address").innerText = fullAddress;

        selectedFullAddress = fullAddress;
        body.classList.add('has-selection');
        updateUseButtonState();

        marker.setPopupContent(`
          <b>📍 Selected Location</b><br><br>
          <b>Village:</b> ${village}<br>
          <b>Town:</b> ${town}<br>
          <b>City:</b> ${city}<br><br>
          ${fullAddress}
        `).openPopup();
      } catch (error) {
        const fallbackAddress = place.display_name || "Not Available";

        document.getElementById("village").innerText = "Not Available";
        document.getElementById("town").innerText = "Not Available";
        document.getElementById("city").innerText = "Not Available";
        document.getElementById("address").innerText = fallbackAddress;

        selectedFullAddress = fallbackAddress;
        body.classList.add('has-selection');
        updateUseButtonState();
      }
    }

    async function loadMore(reset = false) {
      if (loading || !currentQuery) return;

      loading = true;

      const key = currentQuery.toLowerCase() + '_' + page;
      let data = cache[key];

      if (!data) {
        const offset = page * 50;
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&countrycodes=in&limit=50&offset=${offset}&q=${encodeURIComponent(currentQuery)}`
        );
        data = await response.json();

        const seen = new Set();
        data = data.filter((place) => {
          const name = String(place.display_name || '').toLowerCase();
          if (seen.has(name)) return false;
          seen.add(name);
          return true;
        });

        cache[key] = data;
      }

      if (reset) {
        suggestions.innerHTML = '';
      }

      if (!data.length && reset) {
        suggestions.innerHTML = '<div class="item is-placeholder">No places found. Try another search.</div>';
        suggestions.style.display = 'block';
        loading = false;
        return;
      }

      data.forEach((place) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerText = place.display_name;
        div.onclick = () => renderPlace(place);
        suggestions.appendChild(div);
      });

      suggestions.style.display = 'block';
      page += 1;
      loading = false;
    }

    map.on('click', async function (e) {
      const lat = e.latlng.lat;
      const lon = e.latlng.lng;

      document.getElementById("lat").innerText = lat.toFixed(6);
      document.getElementById("lon").innerText = lon.toFixed(6);

      if (marker) {
        marker.setLatLng([lat, lon]);
      } else {
        marker = L.marker([lat, lon]).addTo(map);
      }

      const response = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
      );

      const data = await response.json();
      const addr = data.address || {};

      const village =
        addr.village ||
        addr.hamlet ||
        addr.suburb ||
        addr.neighbourhood ||
        "Not Available";

      const town =
        addr.town ||
        addr.municipality ||
        "Not Available";

      const city =
        addr.city ||
        addr.county ||
        addr.state_district ||
        "Not Available";

      const fullAddress = data.display_name || "Not Available";

      document.getElementById("village").innerText = village;
      document.getElementById("town").innerText = town;
      document.getElementById("city").innerText = city;
      document.getElementById("address").innerText = fullAddress;

      selectedFullAddress = fullAddress;
      body.classList.add('has-selection');
      updateUseButtonState();

      marker.bindPopup(`
        <b>📍 Selected Location</b><br><br>
        <b>Village:</b> ${village}<br>
        <b>Town:</b> ${town}<br>
        <b>City:</b> ${city}<br><br>
        ${fullAddress}
      `).openPopup();
    });

    if (useBtn) {
      useBtn.addEventListener('click', function () {
        if (!selectedFullAddress || selectedFullAddress === 'Not Available') {
          return;
        }

        try {
          sessionStorage.setItem('route-map-picked-' + targetField, selectedFullAddress);
        } catch (error) {}

        let returnUrl = '';
        try {
          returnUrl = sessionStorage.getItem('route-map-return-url') || '';
          sessionStorage.removeItem('route-map-return-url');
        } catch (error) {}

        window.location.href = returnUrl || 'route.html';
      });
    }

    input.addEventListener('input', () => {
      currentQuery = input.value.trim();
      page = 0;
      clearSuggestions();

      if (currentQuery.length < 1) {
        loading = false;
        return;
      }

      loadMore(true);
    });

    input.addEventListener('focus', () => {
      if (input.value.trim()) {
        currentQuery = input.value.trim();
        page = 0;
        loadMore(true);
      }
    });

    suggestions.addEventListener('scroll', () => {
      if (
        suggestions.scrollTop + suggestions.clientHeight >=
        suggestions.scrollHeight - 10
      ) {
        loadMore(false);
      }
    });

    clearSearchBtn.addEventListener('click', () => {
      input.value = '';
      currentQuery = '';
      page = 0;
      clearSuggestions();
    });
  </script>
</body>
</html>
