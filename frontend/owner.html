<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Panel</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <meta name="google-signin-client_id" content="743689462629-ogfmkvkp39jsk49piia08ffsmsrh8qus.apps.googleusercontent.com">
  <meta name="api-base-url" content="https://go-kerala-backend.onrender.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="style.css?v=20260406-2">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-auth-header">
    <div class="owner-auth-brand-lockup">
      <h1 class="logo owner-auth-logo">VECT</h1>
      <p class="owner-auth-logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-auth-main">
    <section class="owner-auth-shell" aria-label="Create account">
      <div class="owner-auth-visual" aria-hidden="true">
        <div class="swiper owner-auth-banner" id="ownerBanner" aria-label="Homepage banner slider">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <div class="owner-auth-banner-card">
                <img
                  class="owner-auth-banner-img"
                  src="https://picsum.photos/id/1011/1400/700"
                  alt="Banner slide 1"
                  loading="lazy"
                />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="owner-auth-banner-card">
                <img
                  class="owner-auth-banner-img"
                  src="https://picsum.photos/id/1025/1400/700"
                  alt="Banner slide 2"
                  loading="lazy"
                />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="owner-auth-banner-card">
                <img
                  class="owner-auth-banner-img"
                  src="https://picsum.photos/id/1035/1400/700"
                  alt="Banner slide 3"
                  loading="lazy"
                />
              </div>
            </div>
          </div>
          <div class="swiper-pagination owner-auth-banner-pagination" aria-label="Slider navigation dots"></div>
        </div>
      </div>

      <div class="owner-auth-panel">
        <div class="owner-auth-panel-head">
          <h1 class="owner-auth-title" data-owner-auth-title>Create an account</h1>
          <p class="owner-auth-subtitle" data-owner-auth-subtitle>Already have an account? <a href="owner.html?mode=login" class="owner-auth-inline-link" data-owner-auth-switch-link>Log in</a></p>
        </div>

        <form class="owner-auth-form" data-owner-auth-form novalidate>
          <label class="owner-auth-field">
            <span class="owner-auth-field-label">Email</span>
            <input type="text" class="owner-auth-input" placeholder="Email" autocomplete="username" data-owner-email>
          </label>

          <label class="owner-auth-field" data-owner-password-field style="display:none;">
            <span class="owner-auth-field-label">Password</span>
            <span class="owner-auth-password-wrap">
              <input type="password" class="owner-auth-input owner-auth-input-password" placeholder="Password" autocomplete="current-password" data-owner-password>
              <button type="button" class="owner-auth-password-toggle" data-owner-password-toggle aria-label="Show password">
                <svg class="owner-auth-password-icon owner-auth-password-icon-show" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"></circle>
                </svg>
                <svg class="owner-auth-password-icon owner-auth-password-icon-hide" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                  <path d="M10.6 6.2A11 11 0 0 1 12 6c6.4 0 10 6 10 6a17.8 17.8 0 0 1-4.3 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M6.6 6.6C4 8.2 2 12 2 12s3.6 6 10 6c1.8 0 3.3-.5 4.6-1.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"></circle>
                </svg>
              </button>
            </span>
          </label>

          <p class="owner-auth-error" data-owner-auth-error hidden>Please fill your email.</p>

          <button type="submit" class="owner-auth-submit">Next</button>
        </form>

        <div data-owner-auth-extras>
          <div class="owner-auth-divider">
            <span></span>
            <p data-owner-auth-divider-text>Or register with</p>
            <span></span>
          </div>

          <div class="owner-auth-socials" aria-label="Owner social account access">
            <div class="owner-auth-google-wrap">
              <div class="owner-auth-google-button" data-google-auth-btn></div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="script.js?v=20260413-1"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    (function () {
      const form = document.querySelector('[data-owner-auth-form]');
      const emailInput = document.querySelector('[data-owner-email]');
      const passwordField = document.querySelector('[data-owner-password-field]');
      const passwordInput = document.querySelector('[data-owner-password]');
      const passwordToggle = document.querySelector('[data-owner-password-toggle]');
      const authExtras = document.querySelector('[data-owner-auth-extras]');
      const authDividerText = document.querySelector('[data-owner-auth-divider-text]');
      const errorText = document.querySelector('[data-owner-auth-error]');
      const googleAuthButton = document.querySelector('[data-google-auth-btn]');
      const googleMetaTag = document.querySelector('meta[name="google-signin-client_id"]');
      const apiBaseMetaTag = document.querySelector('meta[name="api-base-url"]');
      const googleClientId = googleMetaTag ? String(googleMetaTag.getAttribute('content') || '').trim() : '';
      const apiBaseFromMeta = apiBaseMetaTag ? String(apiBaseMetaTag.getAttribute('content') || '').trim().replace(/\/$/, '') : '';
      const currentOrigin = /^https?:/i.test(window.location.origin || '') ? String(window.location.origin || '').trim().replace(/\/$/, '') : '';
      const isLocalHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/i.test(window.location.hostname || '');
      const apiBaseUrl = isLocalHost ? currentOrigin : apiBaseFromMeta;
      const titleText = document.querySelector('[data-owner-auth-title]');
      const subtitleText = document.querySelector('[data-owner-auth-subtitle]');
      const submitButton = form ? form.querySelector('.owner-auth-submit') : null;
      const pageParams = new URLSearchParams(window.location.search);
      const modeParam = pageParams.get('mode');
      const reviewItem = String(pageParams.get('review') || '').trim();
      const returnPage = String(pageParams.get('return') || '').trim() || 'owner-details-done.html';
      const REVIEW_ITEM_STORAGE_KEY = 'owner-review-item';
      const REVIEW_RETURN_STORAGE_KEY = 'owner-review-return-page';
      const hasCreatedAccount = localStorage.getItem('owner-account-created') === 'true';
      const hasSavedLogin =
        Boolean(String(localStorage.getItem('owner-login-email') || '').trim()) &&
        Boolean(String(localStorage.getItem('owner-login-password') || ''));
      const hasGoogleLogin =
        String(localStorage.getItem('owner-login-method') || '').trim() === 'google' &&
        Boolean(String(localStorage.getItem('owner-login-email') || '').trim());
      const isEmailReview = reviewItem === 'owner-email';
      let authMode = 'register';

      if (isEmailReview) {
        authMode = 'register';
      } else if (modeParam === 'login' || modeParam === 'register') {
        authMode = modeParam;
      } else if (hasCreatedAccount && (hasSavedLogin || hasGoogleLogin)) {
        authMode = 'login';
      }

      if (!form || !emailInput || !errorText) {
        return;
      }

      function syncAuthMode() {
        const isLogin = authMode === 'login';

        if (titleText) {
          titleText.textContent = isEmailReview ? 'Update email' : (isLogin ? 'Log in' : 'Create an account');
        }

        if (subtitleText) {
          subtitleText.innerHTML = isEmailReview
            ? 'Enter your updated email address to continue.'
            : isLogin
            ? 'Need an account? <a href="owner.html?mode=register" class="owner-auth-inline-link" data-owner-auth-switch-link>Create account</a>'
            : 'Already have an account? <a href="owner.html?mode=login" class="owner-auth-inline-link" data-owner-auth-switch-link>Log in</a>';
        }

        if (submitButton) {
          submitButton.textContent = isEmailReview ? 'Verify email' : (isLogin ? 'Log in' : 'Next');
        }

        if (passwordField) {
          passwordField.style.display = isLogin ? '' : 'none';
        }

        if (isLogin) {
          const savedEmail = String(localStorage.getItem('owner-login-email') || '').trim();
          if (savedEmail && !emailInput.value.trim()) {
            emailInput.value = savedEmail;
          }
        }
        if (authExtras) {
          authExtras.hidden = isEmailReview;
        }

        if (authDividerText) {
          authDividerText.textContent = isLogin ? 'Or log in with' : 'Or register with';
        }

        if (!isLogin && passwordInput) {
          passwordInput.value = '';
          passwordInput.type = 'password';
          if (passwordToggle) {
            passwordToggle.classList.remove('is-visible');
            passwordToggle.setAttribute('aria-label', 'Show password');
          }
        }

      }

      function hideError() {
        errorText.hidden = true;
      }

      function showError(message) {
        errorText.textContent = message;
        errorText.hidden = false;
      }

      function storeOwnerSession(firstName, lastName, email) {
        sessionStorage.setItem('owner-name', [firstName, lastName].filter(Boolean).join(' ').trim());
        sessionStorage.setItem('owner-first-name', firstName);
        sessionStorage.setItem('owner-last-name', lastName);
        sessionStorage.setItem('owner-email', email);
        sessionStorage.setItem('owner-api-base-url', apiBaseUrl);
        localStorage.setItem('owner-authenticated', 'true');
      }

      function getVerificationPage() {
        if (!isEmailReview) {
          return 'verify.html';
        }

        const verifyUrl = new URL('verify.html', window.location.href);
        verifyUrl.searchParams.set('review', reviewItem);
        verifyUrl.searchParams.set('return', returnPage);
        return verifyUrl.toString();
      }

      function getApiUrl(pathName) {
        if (!apiBaseUrl) {
          return pathName;
        }

        return apiBaseUrl + pathName;
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          window.setTimeout(resolve, ms);
        });
      }

      async function fetchJsonWithRetry(url, options, retryDelays) {
        const delays = Array.isArray(retryDelays) && retryDelays.length ? retryDelays : [3000, 6000, 10000, 15000, 20000, 25000];
        let lastError = null;

        for (let attempt = 0; attempt <= delays.length; attempt += 1) {
          try {
            const response = await fetch(url, options);
            const text = await response.text();
            let data = {};

            try {
              data = text ? JSON.parse(text) : {};
            } catch (error) {
              data = text ? { error: text } : {};
            }

            return {
              ok: response.ok,
              status: response.status,
              data: data
            };
          } catch (error) {
            lastError = error;

            if (attempt < delays.length) {
              await wait(delays[attempt]);
            }
          }
        }

        throw lastError || new Error('Network request failed.');
      }

      [emailInput, passwordInput].forEach(function (input) {
        if (!input) {
          return;
        }

        input.addEventListener('input', function () {
          if (emailInput.value.trim()) {
            hideError();
          }
        });
      });

      if (passwordToggle && passwordInput) {
        passwordToggle.addEventListener('click', function () {
          const shouldShow = passwordInput.type === 'password';
          passwordInput.type = shouldShow ? 'text' : 'password';
          passwordToggle.classList.toggle('is-visible', shouldShow);
          passwordToggle.setAttribute('aria-label', shouldShow ? 'Hide password' : 'Show password');
        });
      }

      function initializeGoogleAuth() {
        if (!googleAuthButton) {
          return;
        }

        if (!googleClientId || googleClientId === 'YOUR_GOOGLE_CLIENT_ID') {
          return;
        }

        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
          return;
        }

        window.google.accounts.id.initialize({
          client_id: googleClientId,
          callback: function (response) {
            if (!response || !response.credential) {
              showError('Google sign-in did not return a valid credential.');
              return;
            }

            fetchJsonWithRetry(getApiUrl('/api/auth/google'), {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                credential: response.credential
              })
            })
              .then(function (result) {
                if (!result.ok || !result.data || !result.data.user) {
                  throw new Error((result.data && result.data.error) || 'Google sign-in failed.');
                }

                const user = result.data.user;
                hideError();
                storeOwnerSession(user.firstName || '', user.lastName || '', user.email || '');
                localStorage.setItem('owner-login-method', 'google');
                localStorage.setItem('owner-login-email', user.email || '');
                localStorage.setItem('owner-login-first-name', user.firstName || '');
                localStorage.setItem('owner-login-last-name', user.lastName || '');
                localStorage.removeItem('owner-login-password');

                if (authMode === 'login') {
                  if (localStorage.getItem('owner-account-created') !== 'true') {
                    throw new Error('No account found. Please create an account first.');
                  }
                  window.location.href = 'owner-details.html';
                  return;
                }

                window.location.href = 'owner-account-setup.html';
              })
              .catch(function (error) {
                showError(error.message || 'Google sign-in failed.');
              });
          }
        });

        function renderGoogleButton() {
          if (!authExtras || authExtras.hidden) {
            return;
          }

          const buttonWidth = Math.max(300, Math.floor(googleAuthButton.getBoundingClientRect().width || googleAuthButton.clientWidth || 300));
          googleAuthButton.innerHTML = '';
          window.google.accounts.id.renderButton(googleAuthButton, {
            theme: 'outline',
            size: 'large',
            text: authMode === 'login' ? 'signin_with' : 'signup_with',
            shape: 'rectangular',
            width: buttonWidth
          });
        }

        renderGoogleButton();
        window.addEventListener('resize', renderGoogleButton);
      }

      form.addEventListener('submit', function (event) {
        event.preventDefault();

        const contact = emailInput.value.trim();
        const isLogin = authMode === 'login';

        if (!contact) {
          showError('Please fill your email.');
          if (!contact) {
            emailInput.focus();
          }
          return;
        }

        if (isLogin) {
          if (localStorage.getItem('owner-account-created') !== 'true') {
            showError('No account found. Please create an account first.');
            return;
          }

          const password = passwordInput ? String(passwordInput.value || '') : '';
          const savedEmail = String(localStorage.getItem('owner-login-email') || '').trim().toLowerCase();
          const savedPassword = String(localStorage.getItem('owner-login-password') || '');
          const savedMethod = String(localStorage.getItem('owner-login-method') || '').trim().toLowerCase();
          const inputEmail = contact.toLowerCase();

          if (savedMethod === 'google' && savedEmail === inputEmail) {
            showError('This account uses Google login. Please use the Google button below.');
            return;
          }

          if (!password) {
            showError('Please enter your password.');
            if (passwordInput) {
              passwordInput.focus();
            }
            return;
          }

          if (!savedEmail || !savedPassword) {
            showError('No account found. Please create an account first.');
            return;
          }

          if (savedEmail !== inputEmail || savedPassword !== password) {
            showError('Invalid email or password.');
            return;
          }

          sessionStorage.setItem('owner-email', contact);
          localStorage.setItem('owner-authenticated', 'true');
          hideError();
          window.location.href = 'owner-details.html';
          return;
        }

        fetchJsonWithRetry(getApiUrl('/api/auth/request-otp'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contact: contact
          })
        })
          .then(function (result) {
            if (!result.ok) {
              throw new Error((result.data && result.data.error) || 'Unable to send OTP.');
            }

            const contactValue = (result.data && result.data.contact) ? String(result.data.contact) : contact;
            hideError();
            storeOwnerSession('', '', contactValue);
            localStorage.setItem('owner-login-method', 'email');
            if (isEmailReview) {
              sessionStorage.setItem(REVIEW_ITEM_STORAGE_KEY, reviewItem);
              sessionStorage.setItem(REVIEW_RETURN_STORAGE_KEY, returnPage);
            } else {
              sessionStorage.removeItem(REVIEW_ITEM_STORAGE_KEY);
              sessionStorage.removeItem(REVIEW_RETURN_STORAGE_KEY);
            }
            window.location.href = getVerificationPage();
          })
          .catch(function (error) {
            showError(error.message || 'Unable to send OTP.');
          });
      });

      syncAuthMode();

      if (window.Swiper) {
        new Swiper('#ownerBanner', {
          loop: true,
          speed: 700,
          autoplay: {
            delay: 3000,
            disableOnInteraction: false
          },
          slidesPerView: 1,
          pagination: {
            el: '.owner-auth-banner-pagination',
            clickable: true
          }
        });
      }

      window.addEventListener('load', function () {
        initializeGoogleAuth();
      });

    })();
  </script>
</body>
</html>
