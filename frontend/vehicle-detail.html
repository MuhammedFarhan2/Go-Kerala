<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vehicle Details</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      background: #f4f6fa;
      color: #111;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .detail-page {
      height: calc(100vh - 56px);
      min-height: calc(100vh - 56px);
      box-sizing: border-box;
      overflow-x: hidden;
      overflow-y: hidden;
      padding-bottom: 24px;
    }

    .detail-shell {
      width: 100%;
      margin: 0;
    }

    .detail-card {
      display: grid;
      grid-template-columns: 1fr;
      background: #fff;
      overflow: hidden;
      padding-bottom: 0;
      height: 100%;
      transform: translateY(-8px);
    }

    .detail-image-wrap {
      position: relative;
      width: 100%;
      height: 48vh;
      min-height: 0;
      background: linear-gradient(180deg, #f9fafc, #eef2f7);
      display: grid;
      place-items: center;
      padding: 0;
      margin: 0;
      border-bottom: 2px solid #111;
    }

    .detail-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      background: #fff;
    }

    .detail-favorite-heart {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 4;
    }

    .detail-content {
      padding: 10px 16px 6px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 6px;
      min-height: 0;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(1.5rem, 2.8vw, 2.4rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .detail-dealer {
      margin: 0;
      color: #3f4756;
      font-size: 1rem;
      font-weight: 700;
    }

    .detail-specs {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #111;
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .detail-place {
      margin: 0;
      color: #111;
      font-size: 0.96rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .detail-place-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      color: #111;
      font-size: 0.96rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .detail-place-icon {
      width: 18px;
      height: 18px;
      display: block;
      object-fit: contain;
    }

    .detail-specs li {
      position: relative;
      padding-left: 14px;
    }

    .detail-specs li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.68em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .detail-meta {
      display: none;
    }

    .detail-actions {
      margin-top: auto;
      padding: 8px 14px 0;
      background: transparent;
    }

    .detail-suggestions {
      position: relative;
      z-index: 1;
      margin-top: 8px;
      margin-bottom: 22px;
      display: grid;
      gap: 8px;
    }

    .detail-suggestions-title {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 800;
      color: #111;
      letter-spacing: 0.02em;
    }

    .detail-suggestion-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .detail-suggestion-box {
      appearance: none;
      text-align: left;
      border: 1px solid #d7dbe3;
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(17, 17, 17, 0.05);
      padding: 0;
      cursor: pointer;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
    }

    .detail-suggestion-image {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      object-fit: contain;
      display: block;
      background: #fff;
      padding: 8px;
      box-sizing: border-box;
    }

    .detail-suggestion-label {
      padding: 6px 8px 8px;
      font-size: 0.78rem;
      line-height: 1.2;
      font-weight: 700;
      color: #111;
      text-align: center;
    }

    button.detail-whatsapp-btn {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: #2AB318 !important;
      background-color: #2AB318 !important;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      box-shadow: 0 10px 22px rgba(42, 179, 24, 0.22);
    }

    button.detail-whatsapp-btn:hover,
    button.detail-whatsapp-btn:focus,
    button.detail-whatsapp-btn:active {
      background: #2AB318 !important;
      background-color: #2AB318 !important;
      color: #fff !important;
      border: 0 !important;
      box-shadow: 0 10px 22px rgba(42, 179, 24, 0.22);
    }

    .detail-empty {
      padding: 28px;
      border-radius: 18px;
      background: #fff;
      border: 1px dashed #d5dbe4;
      color: #667085;
    }

    @media (max-width: 860px) {
      .detail-card {
        grid-template-columns: 1fr;
      }

      .detail-image-wrap {
        height: 42vh;
        min-height: 0;
      }

      .detail-favorite-heart {
        top: 10px;
        right: 10px;
        width: 42px;
        height: 42px;
      }

      .detail-content {
        padding: 8px 14px 4px;
      }

      .detail-actions {
        padding: 6px 12px 8px;
      }

      .detail-suggestion-row {
        gap: 6px;
      }

      .detail-suggestion-image {
        padding: 6px;
      }

      .detail-suggestion-label {
        font-size: 0.72rem;
      }
    }

    .detail-actions-inner {
      width: min(1100px, 100%);
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
    <nav class="header-switch" aria-label="Site switch" data-customer-header-links>
      <a class="header-switch-link header-switch-link--login" href="customer-login.html" aria-label="Open login page">Log in</a>
      <a class="header-switch-link header-switch-link--signup" href="customer-signup.html" aria-label="Open create account page">Sign up</a>
    </nav>

    <button type="button" class="customer-account-btn" id="customer-account-btn" hidden aria-label="Open customer account">
      <svg xmlns="http://www.w3.org/2000/svg" width="35" height="30" viewBox="0 0 24 24">
        <defs>
          <clipPath id="circle-clip-detail">
            <circle cx="12" cy="12" r="11.75"/>
          </clipPath>
        </defs>
        <g clip-path="url(#circle-clip-detail)">
          <circle cx="17.5" cy="6.5" r="2.0" fill="#111"/>
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="#111"/>
        </g>
      </svg>
    </button>
  </header>

  <main class="detail-page">
    <div class="detail-shell">
      <section id="detail-root"></section>
    </div>
  </main>
  <aside class="customer-account-panel" id="customer-account-panel" aria-hidden="true">
    <div class="customer-account-panel-head">
      <button type="button" class="customer-account-close" id="customer-account-close" aria-label="Close account panel">Ã—</button>
    </div>
    <div class="customer-account-panel-body">
      <div class="customer-account-panel-top">
        <div class="customer-account-panel-profile">
          <div class="customer-account-profile-avatar" aria-hidden="true">
            <img src="account.png" alt="" class="customer-account-profile-avatar-image">
          </div>
          <p class="customer-account-panel-name" data-customer-panel-name>Guest</p>
          <p class="customer-account-panel-email" data-customer-panel-email>Sign in to save your profile</p>
        </div>
      </div>
      <div class="customer-account-panel-bottom">
        <div class="customer-account-actions">
          <a class="customer-account-feedback" href="mailto:vectmovers@gmail.com?subject=VECT%20Movers%20Feedback" data-customer-feedback>Feedback</a>
          <a class="customer-account-favorites" href="favorites.html" data-customer-favorites>Favorites</a>
          <button type="button" class="customer-account-logout" data-customer-logout>Log out</button>
        </div>
      </div>
    </div>
  </aside>
  <div class="customer-account-backdrop" id="customer-account-backdrop" aria-hidden="true"></div>
  <script>
    (function () {
      const accountBtn = document.getElementById('customer-account-btn');
      const accountPanel = document.getElementById('customer-account-panel');
      const closeBtn = document.getElementById('customer-account-close');
      const backdrop = document.getElementById('customer-account-backdrop');
      const headerLinks = document.querySelector('[data-customer-header-links]');
      const loginLink = headerLinks ? headerLinks.querySelector('.header-switch-link--login') : null;
      const signupLink = headerLinks ? headerLinks.querySelector('.header-switch-link--signup') : null;
      const panelNameNode = document.querySelector('[data-customer-panel-name]');
      const panelEmailNode = document.querySelector('[data-customer-panel-email]');
      const logoutButton = document.querySelector('[data-customer-logout]');
      const favoritesLink = document.querySelector('[data-customer-favorites]');

      function renderHeaderState() {
        const signedIn = localStorage.getItem('customer-authenticated') === 'true';

        if (accountBtn) {
          accountBtn.hidden = !signedIn;
        }

      if (headerLinks) {
          headerLinks.hidden = signedIn;
          headerLinks.style.display = signedIn ? 'none' : '';
      }

        if (loginLink) {
          loginLink.href = 'customer-login.html?return=vehicle-detail.html';
        }

        if (signupLink) {
          signupLink.href = 'customer-signup.html?return=vehicle-detail.html';
        }

        if (panelNameNode) {
          panelNameNode.textContent = String(localStorage.getItem('customer-login-name') || 'Customer').trim() || 'Customer';
        }

        if (panelEmailNode) {
          panelEmailNode.textContent = String(localStorage.getItem('customer-login-email') || 'Connected account').trim() || 'Connected account';
        }

        if (favoritesLink) {
          favoritesLink.href = 'favorites.html';
        }
      }

      function openPanel() {
        if (!accountPanel || !backdrop) {
          return;
        }

        accountPanel.setAttribute('aria-hidden', 'false');
        accountPanel.classList.add('is-open');
        backdrop.classList.add('is-visible');
        backdrop.setAttribute('aria-hidden', 'false');
      }

      function closePanel() {
        if (!accountPanel || !backdrop) {
          return;
        }

        accountPanel.setAttribute('aria-hidden', 'true');
        accountPanel.classList.remove('is-open');
        backdrop.classList.remove('is-visible');
        backdrop.setAttribute('aria-hidden', 'true');
      }

      renderHeaderState();

      window.addEventListener('storage', renderHeaderState);
      window.addEventListener('focus', renderHeaderState);

      if (accountBtn) {
        accountBtn.addEventListener('click', function () {
          renderHeaderState();
          openPanel();
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', closePanel);
      }

      if (backdrop) {
        backdrop.addEventListener('click', closePanel);
      }

      if (logoutButton) {
        logoutButton.addEventListener('click', function () {
          localStorage.removeItem('customer-authenticated');
          localStorage.removeItem('customer-login-method');
          localStorage.removeItem('customer-login-email');
          localStorage.removeItem('customer-login-name');
          localStorage.removeItem('customer-login-picture');
          closePanel();
          renderHeaderState();
        });
      }

      const root = document.getElementById('detail-root');
      const FAVORITES_STORAGE_KEY = 'vect-favorites-v1';
      const PENDING_FAVORITE_KEY = 'pending-favorite-toggle';
      let data = null;
      try {
        data = JSON.parse(sessionStorage.getItem('submit-vehicle-detail') || 'null');
      } catch (error) {
        data = null;
      }

      if (!data || !data.title) {
        root.innerHTML = '<div class="detail-empty">No vehicle selected. Go back and press VIEW on a card.</div>';
        return;
      }

      function loadFavorites() {
        try {
          const raw = localStorage.getItem(FAVORITES_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function saveFavorites(favorites) {
        localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(favorites));
      }

      function isSignedIn() {
        return localStorage.getItem('customer-authenticated') === 'true';
      }

      function getFavoriteId() {
        return String(data.scope || data.title || '').trim();
      }

      const imageSrc = data.image && data.image.src ? data.image.src : '';
      const imageAlt = data.image && data.image.alt ? data.image.alt : data.title;
      const specs = Array.isArray(data.specs) ? data.specs : [];
      const suggestions = [
        { title: 'Open Body Truck', image: 'white-flatbed-truck.png', dealer: 'Prime Logistics', specs: ['5 ton', 'Open body', 'Available in Kochi'] },
        { title: 'Box Container Truck', image: 'modern-white-box-truck.png', dealer: 'Metro Cargo Movers', specs: ['7 ton', 'Closed body', 'Ernakulam'] },
        { title: 'Hydraulic Excavator', image: 'yellow-hydraulic-excavator.png', dealer: 'BuildPro Infra', specs: ['Operator included', 'Heavy duty', 'Kottayam'] }
      ];

      root.innerHTML = [
        '<article class="detail-card">',
        '<div class="detail-image-wrap">',
        '<button type="button" class="demo-favorite-heart detail-favorite-heart" data-detail-favorite aria-pressed="false" aria-label="Mark as favorite">',
        '  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">',
        '    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>',
        '  </svg>',
        '</button>',
        '<img class="detail-image" src="' + imageSrc.replace(/"/g, '&quot;') + '" alt="' + imageAlt.replace(/"/g, '&quot;') + '">',
        '</div>',
        '<div class="detail-content">',
        '<h1 class="detail-title">' + String(data.title || 'Vehicle').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</h1>',
        '<p class="detail-dealer">Dealer : ' + String(data.dealer || 'abc').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>',
        '<ul class="detail-specs">' + specs.map(function (spec) {
          return '<li>' + String(spec).replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</li>';
        }).join('') + '</ul>',
        '<p class="detail-place-row"><img src="location-2955.svg" alt="" class="detail-place-icon" aria-hidden="true"><span class="detail-place">' + String(data.place || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span></p>',
        '<div class="detail-actions">',
        '<div class="detail-actions-inner">',
        '<button type="button" class="detail-whatsapp-btn" style="background:#2AB318 !important;background-color:#2AB318 !important;color:#fff !important;border:0 !important;">WhatsApp</button>',
        '</div>',
        '</div>',
        '<div class="detail-suggestions">',
        '<p class="detail-suggestions-title">Suggested Vehicles</p>',
        '<div class="detail-suggestion-row">' + suggestions.map(function (item) {
          return [
            '<button type="button" class="detail-suggestion-box" data-detail-suggestion data-title="' + item.title.replace(/"/g, '&quot;') + '" data-image="' + item.image.replace(/"/g, '&quot;') + '" data-dealer="' + item.dealer.replace(/"/g, '&quot;') + '" data-specs="' + item.specs.join('|').replace(/"/g, '&quot;') + '">',
            '<img class="detail-suggestion-image" src="' + item.image + '" alt="' + item.title.replace(/"/g, '&quot;') + '">',
            '<div class="detail-suggestion-label">' + item.title + '</div>',
            '</button>'
          ].join('');
        }).join('') + '</div>',
        '</div>',
        '</div>',
        '</article>'
      ].join('');

      const favoriteButton = root.querySelector('[data-detail-favorite]');

      function syncFavoriteButton() {
        if (!favoriteButton) {
          return;
        }

        const favoriteId = getFavoriteId();
        const isSelected = favoriteId ? loadFavorites().some(function (item) {
          return item.id === favoriteId;
        }) : false;

        favoriteButton.classList.toggle('is-selected', isSelected);
        favoriteButton.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
        favoriteButton.setAttribute('aria-label', isSelected ? 'Remove favorite' : 'Mark as favorite');
      }

      function redirectToSignIn(nextTarget) {
        sessionStorage.setItem(PENDING_FAVORITE_KEY, JSON.stringify(nextTarget));
        window.location.href = 'customer-login.html?return=vehicle-detail.html';
      }

      function applyPendingFavoriteIfAny() {
        if (!isSignedIn()) {
          return;
        }

        try {
          const raw = sessionStorage.getItem(PENDING_FAVORITE_KEY);
          const pending = raw ? JSON.parse(raw) : null;

          if (!pending || pending.id !== getFavoriteId() || !favoriteButton) {
            return;
          }

          const favorites = loadFavorites();
          const existingIndex = favorites.findIndex(function (item) {
            return item.id === pending.id;
          });

          if (pending.action === 'add' && existingIndex === -1) {
            favorites.unshift({
              id: pending.id,
              title: String(data.title || 'Saved vehicle').trim(),
              alt: String(imageAlt || data.title || 'Saved vehicle').trim(),
              image: String(imageSrc || '').trim(),
              meta: [
                String(data.dealer || '').trim(),
                specs.filter(Boolean).join(' · ')
              ].filter(Boolean)
            });
            saveFavorites(favorites);
          } else if (pending.action === 'remove' && existingIndex >= 0) {
            favorites.splice(existingIndex, 1);
            saveFavorites(favorites);
          }

          syncFavoriteButton();
        } catch (error) {
          // Ignore malformed pending state.
        } finally {
          sessionStorage.removeItem(PENDING_FAVORITE_KEY);
        }
      }

      if (favoriteButton) {
        favoriteButton.addEventListener('click', function () {
          const favoriteId = getFavoriteId();
          if (!favoriteId) {
            return;
          }

          if (!isSignedIn()) {
            redirectToSignIn({
              id: favoriteId,
              action: favoriteButton.classList.contains('is-selected') ? 'remove' : 'add'
            });
            return;
          }

          const favorites = loadFavorites();
          const existingIndex = favorites.findIndex(function (item) {
            return item.id === favoriteId;
          });

          if (existingIndex >= 0) {
            favorites.splice(existingIndex, 1);
          } else {
            favorites.unshift({
              id: favoriteId,
              title: String(data.title || 'Saved vehicle').trim(),
              alt: String(imageAlt || data.title || 'Saved vehicle').trim(),
              image: String(imageSrc || '').trim(),
              meta: [
                String(data.dealer || '').trim(),
                specs.filter(Boolean).join(' · ')
              ].filter(Boolean)
            });
          }

          saveFavorites(favorites);
          syncFavoriteButton();
        });
      }

      const ctaButton = root.querySelector('.detail-whatsapp-btn');
      if (ctaButton) {
        ctaButton.style.background = '#2AB318';
        ctaButton.style.backgroundColor = '#2AB318';
        ctaButton.style.color = '#fff';
      }

      syncFavoriteButton();
      applyPendingFavoriteIfAny();

      Array.from(root.querySelectorAll('[data-detail-suggestion]')).forEach(function (button) {
        button.addEventListener('click', function () {
          const nextData = {
            title: String(button.getAttribute('data-title') || 'Vehicle').trim(),
            dealer: String(button.getAttribute('data-dealer') || 'abc').trim(),
            image: {
              src: String(button.getAttribute('data-image') || '').trim(),
              alt: String(button.getAttribute('data-title') || 'Vehicle').trim()
            },
            specs: String(button.getAttribute('data-specs') || '').split('|').filter(Boolean)
          };

          sessionStorage.setItem('submit-vehicle-detail', JSON.stringify(nextData));
          window.location.reload();
        });
      });
    })();
  </script>
</body>
</html>
