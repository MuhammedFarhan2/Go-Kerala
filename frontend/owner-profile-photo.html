<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Photo</title>
  <script>
    document.documentElement.classList.add('show-page-loader');
  </script>
  <meta name="api-base-url" content="https://mymusics.onrender.com">
  <link rel="stylesheet" href="style.css?v=20260409-2">
</head>
<body>
  <div class="page-loader" id="page-loader" aria-hidden="true">
    <div class="page-loader-content">
      <div class="page-loader-spinner" aria-hidden="true">
        <span class="page-loader-ring page-loader-ring-outer"></span>
        <span class="page-loader-ring page-loader-ring-middle"></span>
        <span class="page-loader-ring page-loader-ring-inner"></span>
      </div>
      <p class="page-loader-text">Loading</p>
    </div>
  </div>

  <header class="header owner-header owner-blank-header">
    <div class="brand-lockup">
      <h1 class="logo">VECT</h1>
      <p class="logo-sub">MOVERS</p>
    </div>
  </header>

  <main class="owner-main owner-blank-main">
    <section class="owner-blank-sheet" aria-label="Profile photo instructions">
      <div class="owner-blank-content owner-profile-content">
        <h1 class="owner-profile-title">Take your profile photo</h1>
        <ol class="owner-profile-points">
          <li>Face the camera directly with your eyes and mouth clearly visible</li>
          <li>Make sure the photo is well lit, free of glare, and in focus</li>
          <li>No photos of a photo, filters, or alterations</li>
        </ol>

        <figure class="owner-profile-reference-frame">
          <img
            src="profile-photo-reference.avif"
            alt="Reference example for taking a profile photo"
            class="owner-profile-reference-image"
          >
        </figure>
      </div>
    </section>
  </main>

  <div class="owner-heavy-bottom-bar owner-profile-bottom-bar">
    <input
      type="file"
      accept=".jpg,.jpeg,.png,image/jpeg,image/png"
      hidden
      data-owner-profile-upload-input
    >
    <input
      type="file"
      accept="image/*"
      capture="user"
      hidden
      data-owner-profile-camera-input
    >

    <button type="button" class="owner-next-btn owner-profile-add-photo-btn" data-owner-profile-action-btn>
      Take Photo with Camera
    </button>
  </div>

  <div class="owner-profile-camera" hidden data-owner-profile-camera>
    <div class="owner-profile-camera-stage">
      <video class="owner-profile-camera-video" autoplay playsinline muted data-owner-profile-video></video>
      <div class="owner-profile-camera-mask" aria-hidden="true">
        <div class="owner-profile-camera-oval"></div>
      </div>
      <div class="owner-profile-camera-copy">
        <h2 class="owner-profile-camera-title">Take a photo</h2>
        <p class="owner-profile-camera-text">Position your face in the oval and hold still.</p>
      </div>
      <button type="button" class="owner-profile-camera-capture" aria-label="Capture photo" data-owner-profile-camera-capture>
        <span class="owner-profile-camera-capture-ring"></span>
      </button>
    </div>
  </div>

  <script src="script.js?v=20260413-1"></script>
  <script>
    (function () {
      const actionButton = document.querySelector('[data-owner-profile-action-btn]');
      const cameraInput = document.querySelector('[data-owner-profile-camera-input]');
      const uploadInput = document.querySelector('[data-owner-profile-upload-input]');
      const pageParams = new URLSearchParams(window.location.search);
      const reviewItem = String(pageParams.get('review') || '').trim();
      const returnPage = String(pageParams.get('return') || '').trim() || 'owner-next.html';
      const profileSessionToken = String(pageParams.get('profileSession') || '').trim();
      const PROFILE_STATUS_KEY = 'owner-profile-photo-status-v2';
      const PROFILE_SUBMITTED_KEY = 'owner-profile-photo-submitted-v2';
      const PROFILE_IMAGE_KEY = 'owner-profile-photo';
      const isProfileReview = reviewItem === 'owner-profile-photo';
      const apiBaseMetaTag = document.querySelector('meta[name="api-base-url"]');
      const apiBaseUrl = apiBaseMetaTag ? String(apiBaseMetaTag.getAttribute('content') || '').trim().replace(/\/$/, '') : '';
      if (!actionButton || !cameraInput || !uploadInput) {
        return;
      }

      function getApiUrl(pathName) {
        return apiBaseUrl ? apiBaseUrl + pathName : pathName;
      }

      const isMobileDevice = window.matchMedia('(max-width: 680px)').matches || window.matchMedia('(pointer: coarse)').matches || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

      async function markProfileSessionComplete() {
        if (!profileSessionToken) {
          return;
        }

        try {
          await fetch(getApiUrl('/api/profile-photo-session/complete'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              token: profileSessionToken
            })
          });
        } catch (error) {
          return;
        }
      }

      async function finishProfilePhotoCapture(photoDataUrl) {
        if (!window.ownerMediaStore) {
          throw new Error('Image storage is not available on this device.');
        }

        await window.ownerMediaStore.setItem(PROFILE_IMAGE_KEY, photoDataUrl);
        sessionStorage.setItem(PROFILE_STATUS_KEY, 'completed');
        sessionStorage.setItem(PROFILE_SUBMITTED_KEY, 'yes');
        await markProfileSessionComplete();
        if (isProfileReview) {
          sessionStorage.setItem('owner-profile-photo-return-page', returnPage);
        } else {
          sessionStorage.removeItem('owner-profile-photo-return-page');
        }

        window.location.href = 'owner-profile-photo-success.html';
      }

      function captureFromOval() {
        cameraInput.click();
      }

      actionButton.addEventListener('click', function () {
        captureFromOval();
      });

      cameraInput.addEventListener('change', function () {
        const file = cameraInput.files && cameraInput.files[0];

        if (!file) {
          return;
        }

        const reader = new FileReader();

        reader.onload = function () {
          finishProfilePhotoCapture(String(reader.result || '')).catch(function (error) {
            window.alert(error.message || 'Unable to save profile photo.');
          });
        };

        reader.readAsDataURL(file);
      });

      uploadInput.addEventListener('change', function () {
        const file = uploadInput.files && uploadInput.files[0];

        if (!file) {
          return;
        }

        const reader = new FileReader();

        reader.onload = function () {
          finishProfilePhotoCapture(String(reader.result || '')).catch(function (error) {
            window.alert(error.message || 'Unable to save profile photo.');
          });
        };

        reader.readAsDataURL(file);
      });

    })();
  </script>
</body>
</html>
